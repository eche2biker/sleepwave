<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NETGRID v6</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020c04;overflow:hidden;font-family:'Share Tech Mono',monospace}
#root{width:100vw;height:100vh;}
#loadError{display:none;position:fixed;inset:0;background:#020c04;color:#ff2222;font-family:monospace;font-size:13px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9999;letter-spacing:2px;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#020c04}
::-webkit-scrollbar-thumb{background:#00ff2230;border-radius:3px}
input[type=range]{-webkit-appearance:none;background:transparent;height:16px}
input[type=range]::-webkit-slider-runnable-track{background:#00ff2220;height:3px;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#00ff22;border-radius:50%;margin-top:-4px;cursor:pointer}
select option{background:#030e05;color:#00ff22}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>
<div id="root"></div>
<div id="loadError" style="display:none">
  <span>⚠ ERROR AL CARGAR NETGRID</span>
  <span id="errMsg" style="font-size:10px;color:#ff8800;opacity:.7"></span>
  <span style="font-size:9px;opacity:.4">Verifica tu conexión a internet</span>
</div>
<script>
window.addEventListener('error', function(e){
  var el = document.getElementById('loadError');
  if(el){ el.style.display='flex'; document.getElementById('errMsg').textContent = e.message || 'Script load error'; }
});
</script>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useCallback,memo} = React;

const uid=()=>Math.random().toString(36).slice(2,9);
const rndPing=()=>Math.floor(Math.random()*79)+1;
const rnd=(a,b)=>Math.floor(Math.random()*(b-a))+a;
const nowT=()=>new Date().toLocaleTimeString('es-MX',{hour12:false});
const nowDT=()=>new Date().toLocaleString('es-MX',{hour12:false});

const USERS=['jlopez','mgarcia','drojas','aherrera','cgomez','fsanchez'];
const OSS=['Win 11','Win 10','Ubuntu 22','Win Server','macOS'];
const DEPTS=['TI','Contabilidad','RRHH','Direccion','Ventas','Almacen','Soporte'];
const STLIST=['ACTIVO','MANTENIMIENTO','BAJA','REEMPLAZADO'];
const SC={ACTIVO:'#00ff22',MANTENIMIENTO:'#ffff00',BAJA:'#ff2222',REEMPLAZADO:'#00aaff'};
const BWHY=['Descompuesto','Obsoleto','Robado','Actualizacion','Dano fisico','Otro'];
const VPNP=['OpenVPN','WireGuard','L2TP','PPTP','IKEv2','Cisco AnyConnect'];
const BLC={0:'#ff2222',1:'#00ff22',2:'#ffff00'};
const BLLABEL={0:'INACTIVO',1:'ACTIVO',2:'DESCONOCIDO'};
function blNum(v){var n=parseInt(v);return isNaN(n)?2:n;}
const PAGE=20;
const ACCS=[
  {id:'u1',username:'admin',password:'admin123',name:'Carlos Gomez',role:'ADMIN',dept:'TI',avatar:'CG'},
  {id:'u2',username:'tecnico',password:'tec456',name:'Diana Rojas',role:'TECNICO',dept:'Soporte',avatar:'DR'},
  {id:'u3',username:'viewer',password:'view789',name:'Pedro Vega',role:'VIEWER',dept:'Direccion',avatar:'PV'},
];
const PERMS={
  ADMIN:{edit:true,del:true,add:true,delRow:true},
  TECNICO:{edit:true,del:false,add:false,delRow:false},
  VIEWER:{edit:false,del:false,add:false,delRow:false},
};
const RC={ADMIN:'#00ff22',TECNICO:'#ffff00',VIEWER:'#00aaff'};

function mkPC(r,c){
  const roll=Math.random();
  const status=roll>.88?'MANTENIMIENTO':roll>.94?'BAJA':'ACTIVO';
  const on=status==='ACTIVO';
  return {
    id:uid(),
    name:'PC-'+String(r+1).padStart(2,'0')+String(c+1).padStart(2,'0'),
    ip:'192.168.'+String(r+1)+'.'+String(c+1),
    status,ping:on?rndPing():null,
    user:on?USERS[rnd(0,USERS.length)]:null,
    os:OSS[rnd(0,OSS.length)],
    dept:DEPTS[rnd(0,DEPTS.length)],
    cpu:on?rnd(5,90):0,ram:on?rnd(10,90):0,
    uptime:on?rnd(0,72)+'h '+rnd(0,60)+'m':'--',
    alerts:Math.random()>.85?['CPU alta']:[],
    bajaReason:null,addedBy:'system',
    addedAt:new Date(Date.now()-Math.random()*365*24*3600000).toISOString(),
    history:[],
    mac:'',
    bitlocker:Math.random()>.3?1:Math.random()>.5?0:2,
    bl_key:'',
    ubicacion:'',
    ultimo_mant:'',
    winPass:'',email:'',emailPass:'',
    vpn:{servidor:'',usuario:'',pass:'',protocolo:'OpenVPN'},
    office365:Math.random()>.5,
    carpetas:[
      {nombre:'\\servidor\\Contabilidad',acceso:Math.random()>.4},
      {nombre:'\\servidor\\Compartida',acceso:Math.random()>.4},
    ],
    programas:['Chrome','Antivirus','Office 365','Adobe Reader'].filter(()=>Math.random()>.4),
  };
}

function mkRows(n,perRow){
  return Array.from({length:n},function(_,r){
    return {id:uid(),label:'Fila '+(r+1),pcs:Array.from({length:perRow},function(_,c){return mkPC(r,c);})};
  });
}

function useSound(){
  const ctx=useRef(null);
  function go(f,d,t,v){
    try{
      if(!ctx.current) ctx.current=new (window.AudioContext||window.webkitAudioContext)();
      const o=ctx.current.createOscillator(),g=ctx.current.createGain();
      o.connect(g);g.connect(ctx.current.destination);
      o.type=t;o.frequency.setValueAtTime(f,ctx.current.currentTime);
      g.gain.setValueAtTime(v,ctx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.current.currentTime+d);
      o.start();o.stop(ctx.current.currentTime+d);
    }catch(e){}
  }
  return {
    click:function(){go(800,.05,'square',.06);},
    save:function(){go(600,.05,'sine',.06);setTimeout(function(){go(900,.08,'sine',.06);},60);},
    del:function(){go(300,.12,'sawtooth',.08);setTimeout(function(){go(180,.15,'sawtooth',.06);},80);},
    login:function(){[300,500,700,900].forEach(function(f,i){setTimeout(function(){go(f,.1,'sine',.05);},i*70);});},
    logout:function(){[900,600,400,200].forEach(function(f,i){setTimeout(function(){go(f,.1,'sine',.05);},i*60);});},
    warn:function(){go(440,.1,'square',.09);setTimeout(function(){go(440,.1,'square',.09);},200);},
    ping:function(){go(1200,.04,'sine',.05);},
    move:function(){go(500,.05,'triangle',.06);},
    ok:function(){go(700,.06,'sine',.06);setTimeout(function(){go(1000,.1,'sine',.07);},70);},
  };
}

const MatrixRain=memo(function MatrixRain(props){
  const ref=useRef(null);
  useEffect(function(){
    const cv=ref.current;if(!cv)return;
    const cx=cv.getContext('2d');
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    const fs=13,cols=Math.floor(cv.width/fs),drops=Array(cols).fill(1);
    const chars='0123456789ABCDEF';
    let fr,last=0;
    function draw(ts){
      if(ts-last>60){
        last=ts;
        cx.fillStyle='rgba(2,12,4,.05)';cx.fillRect(0,0,cv.width,cv.height);
        drops.forEach(function(y,i){
          cx.fillStyle='rgba(0,255,34,'+(Math.random()*.05+.015)+')';
          cx.font=fs+'px monospace';
          cx.fillText(chars[Math.floor(Math.random()*chars.length)],i*fs,y*fs);
          if(y*fs>cv.height&&Math.random()>.975)drops[i]=0;
          drops[i]++;
        });
      }
      fr=requestAnimationFrame(draw);
    }
    fr=requestAnimationFrame(draw);
    return function(){cancelAnimationFrame(fr);};
  },[]);
  return React.createElement('canvas',{ref:ref,style:{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,opacity:props.opacity||.4}});
});

function PCCard(props){
  const {pc,onEdit,onDragStart,onDrop,selected,onSelect,canEdit,snd}=props;
  const [hov,setHov]=useState(false);
  const sc=SC[pc.status]||'#00ff22';
  const hasAlert=pc.alerts&&pc.alerts.length>0;
  return (
    <div
      draggable={canEdit}
      onDragStart={function(e){if(canEdit){onDragStart(e,pc);snd.move();}}}
      onDragOver={function(e){e.preventDefault();}}
      onDrop={function(e){onDrop(e,pc);}}
      onMouseEnter={function(){setHov(true);}}
      onMouseLeave={function(){setHov(false);}}
      style={{width:82,minWidth:82,height:96,flexShrink:0,position:'relative',userSelect:'none',
        background:selected?'#001520':hov?(pc.status==='ACTIVO'?'#0a1f0a':'#1a0a0a'):'#050f05',
        border:'1px solid '+(selected?'#00aaff':hasAlert?'#ff8800':hov?sc:sc+'28'),
        borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        cursor:canEdit?'grab':'pointer',transition:'border .12s,background .12s',
        boxShadow:hov?'0 0 10px '+sc+'20':selected?'0 0 8px #00aaff25':'none'}}>
      <div style={{position:'absolute',top:4,right:5,width:6,height:6,borderRadius:'50%',
        background:sc,boxShadow:'0 0 4px '+sc,animation:pc.status==='ACTIVO'?'pulse 2s infinite':'none'}}/>
      {hasAlert && <div style={{position:'absolute',top:4,left:4,background:'#ff8800',color:'#000',fontSize:7,fontWeight:700,padding:'1px 4px',borderRadius:2}}>!</div>}
      {pc.status!=='ACTIVO' && <div style={{position:'absolute',top:4,left:hasAlert?14:4,fontSize:6,color:sc,padding:'1px 4px',borderRadius:2,border:'1px solid '+sc+'30',background:sc+'12'}}>
        {pc.status==='MANTENIMIENTO'?'MANT':pc.status==='BAJA'?'BAJA':'REMP'}
      </div>}
      <div onClick={function(e){e.stopPropagation();onSelect(pc.id);snd.click();}}
        style={{position:'absolute',bottom:4,right:4,width:10,height:10,borderRadius:2,
          border:'1px solid '+(selected?'#00aaff':'#2a2a2a'),background:selected?'#00aaff':'transparent',
          cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#000'}}>
        {selected?'v':''}
      </div>
      <svg viewBox="0 0 44 38" width="36" height="30" fill="none">
        <rect x="3" y="3" width="38" height="24" rx="2.5" fill={pc.status==='ACTIVO'?'#061a06':'#100608'} stroke={sc} strokeWidth="1.4" opacity=".9"/>
        <rect x="6" y="6" width="32" height="18" rx="1" fill="#020a02" stroke={sc} strokeWidth=".5" opacity=".6"/>
        <rect x="7" y="7.5" width={Math.max(1,(pc.cpu||0)*.3)} height="3" rx=".5" fill={pc.cpu>80?'#ff2222':pc.cpu>50?'#ffff00':'#00ff22'} opacity=".8"/>
        <rect x="18" y="27" width="8" height="3" rx=".5" fill={sc} opacity=".28"/>
        <circle cx="22" cy="28.5" r=".9" fill={sc} opacity={pc.status==='ACTIVO'?.85:.25}/>
      </svg>
      <div style={{fontSize:8,color:sc,marginTop:2,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{pc.name}</div>
      <div style={{fontSize:7,color:'#0a2',opacity:.45,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pc.ip}</div>
      {pc.mac&&<div style={{fontSize:6,color:'#00ccff',opacity:.55,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{pc.mac}</div>}
      <div style={{fontSize:7,color:BLC[blNum(pc.bitlocker)],fontWeight:700}}>{BLLABEL[blNum(pc.bitlocker)]}</div>
      {pc.status==='ACTIVO'&&pc.ping&&<span style={{fontSize:7,color:pc.ping<20?'#00ff22':pc.ping<50?'#ffff00':'#ff8800'}}>{pc.ping}ms</span>}
      {hov&&<div onClick={function(){onEdit(pc);snd.click();}}
        style={{position:'absolute',inset:0,background:'rgba(0,0,0,.83)',border:'1px solid '+sc,borderRadius:6,
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer'}}>
        <span style={{fontSize:10,color:sc,letterSpacing:2}}>{canEdit?'EDITAR':'VER'}</span>
        <span style={{fontSize:7,color:sc,opacity:.55}}>{pc.dept}</span>
        {pc.user&&<span style={{fontSize:7,color:'#0a2',opacity:.65}}>{pc.user}</span>}
      </div>}
    </div>
  );
}

function GridRow(props){
  const {row,rIdx,perms,selIds,onEdit,onDragStart,onDrop,onSel,onAddPC,onDelRow,onRowPwr,snd}=props;
  const [page,setPage]=useState(0);
  const total=Math.ceil(row.pcs.length/PAGE);
  const shown=row.pcs.slice(page*PAGE,(page+1)*PAGE);
  const onPct=Math.round(row.pcs.filter(function(p){return p.status==='ACTIVO';}).length/Math.max(row.pcs.length,1)*100);
  const tb={padding:'2px 9px',background:'transparent',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:3,transition:'all .12s'};
  return (
    <div style={{marginBottom:12,background:'rgba(3,14,5,.88)',border:'1px solid #00ff2213',borderRadius:8,padding:'10px 14px'}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:8,gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize:10,letterSpacing:3,color:'#00ff22',flexShrink:0}}>{'> '+row.label.toUpperCase()}</span>
        <span style={{fontSize:7,opacity:.3}}>{row.pcs.filter(function(p){return p.status==='ACTIVO';}).length+'/'+row.pcs.length}</span>
        <div style={{width:48,height:3,background:'#0a100a',borderRadius:2,overflow:'hidden',flexShrink:0}}>
          <div style={{height:'100%',width:onPct+'%',background:'linear-gradient(90deg,#0a2,#00ff22)',transition:'width .5s'}}/>
        </div>
        {total>1&&<div style={{display:'flex',alignItems:'center',gap:4}}>
          <button onClick={function(){setPage(function(p){return Math.max(0,p-1);});}} disabled={page===0} style={Object.assign({},tb,{border:'1px solid #00ff2220',color:page===0?'#333':'#00ff22'})}>{'<'}</button>
          <span style={{fontSize:8,color:'#00ff22',opacity:.4,minWidth:70,textAlign:'center'}}>{(page+1)+'/'+total+' - '+row.pcs.length+' PCs'}</span>
          <button onClick={function(){setPage(function(p){return Math.min(total-1,p+1);});}} disabled={page===total-1} style={Object.assign({},tb,{border:'1px solid #00ff2220',color:page===total-1?'#333':'#00ff22'})}>{'>'}</button>
        </div>}
        <div style={{flex:1}}/>
        {perms.edit&&<React.Fragment>
          <button onClick={function(){onRowPwr(rIdx,'ACTIVO');snd.click();}}
            style={Object.assign({},tb,{border:'1px solid #00ff2212',color:'#00ff2245'})}
            onMouseOver={function(e){e.target.style.borderColor='#00ff22';e.target.style.color='#00ff22';}}
            onMouseOut={function(e){e.target.style.borderColor='#00ff2212';e.target.style.color='#00ff2245';}}>ON</button>
          <button onClick={function(){onRowPwr(rIdx,'MANTENIMIENTO');snd.click();}}
            style={Object.assign({},tb,{border:'1px solid #ffff0012',color:'#ffff0040'})}
            onMouseOver={function(e){e.target.style.borderColor='#ffff00';e.target.style.color='#ffff00';}}
            onMouseOut={function(e){e.target.style.borderColor='#ffff0012';e.target.style.color='#ffff0040';}}>MANT</button>
        </React.Fragment>}
        {perms.delRow&&<button onClick={function(){onDelRow(row.id);snd.del();}}
          style={Object.assign({},tb,{border:'1px solid #ff222212',color:'#ff222235'})}
          onMouseOver={function(e){e.target.style.borderColor='#ff2222';e.target.style.color='#ff2222';}}
          onMouseOut={function(e){e.target.style.borderColor='#ff222212';e.target.style.color='#ff222235';}}>X</button>}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {shown.map(function(pc){return <PCCard key={pc.id} pc={pc} onEdit={onEdit} onDragStart={onDragStart} onDrop={onDrop} selected={selIds.has(pc.id)} onSelect={onSel} canEdit={perms.edit} snd={snd}/>;} )}
        {perms.add&&page===total-1&&<div onClick={function(){onAddPC(row.id);}}
          style={{width:82,minWidth:82,height:96,flexShrink:0,borderRadius:6,border:'1.5px dashed #1a3a1a',
            display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#1a4a1a',fontSize:24,background:'transparent'}}
          onMouseOver={function(e){e.currentTarget.style.borderColor='#00ff22';e.currentTarget.style.color='#00ff22';}}
          onMouseOut={function(e){e.currentTarget.style.borderColor='#1a3a1a';e.currentTarget.style.color='#1a4a1a';}}>+</div>}
      </div>
    </div>
  );
}

function Sec(props){
  const [open,setOpen]=useState(props.open!==false);
  const c=props.color||'#00ff22';
  return (
    <div style={{marginBottom:8,border:'1px solid '+c+'18',borderRadius:6,overflow:'hidden'}}>
      <div onClick={function(){setOpen(function(o){return !o;});}}
        style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:c+'0a',cursor:'pointer',userSelect:'none'}}>
        <span style={{fontSize:14}}>{props.icon}</span>
        <span style={{fontSize:8,letterSpacing:3,color:c,flex:1,fontWeight:700}}>{props.title}</span>
        <span style={{fontSize:10,color:c,opacity:.5}}>{open?'v':'>>'}</span>
      </div>
      {open&&<div style={{padding:'12px',background:'#020c04'}}>{props.children}</div>}
    </div>
  );
}

function PwdField(props){
  const {label,val,onChange,disabled,inp,ac}=props;
  const [show,setShow]=useState(false);
  const c=ac||'#00ff22';
  return (
    <div>
      <div style={{fontSize:7,letterSpacing:2,opacity:.35,marginBottom:3}}>{label}</div>
      <div style={{position:'relative'}}>
        <input type={show?'text':'password'} value={val||''} onChange={onChange} disabled={disabled}
          style={Object.assign({},inp,{paddingRight:28,opacity:disabled?.55:1,cursor:disabled?'not-allowed':'text'})}
          onFocus={function(e){if(!disabled)e.target.style.borderColor=c;}}
          onBlur={function(e){e.target.style.borderColor='#00ff2218';}}/>
        <span onClick={function(){setShow(function(s){return !s;});}}
          style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:11,opacity:.5,color:c,userSelect:'none'}}>
          {show?'O':'*'}
        </span>
      </div>
    </div>
  );
}

function ItemList(props){
  const {items,onToggle,onAdd,onDel,canEdit,color,showCheck}=props;
  const [adding,setAdding]=useState(false);
  const [newVal,setNewVal]=useState('');
  const c=color||'#00ff22';
  function commit(){
    if(newVal.trim()){onAdd(newVal.trim());setNewVal('');}
    setAdding(false);
  }
  return (
    <div>
      {items.length===0&&!adding&&<div style={{fontSize:9,opacity:.25,textAlign:'center',padding:'8px',letterSpacing:2}}>VACIO</div>}
      {items.map(function(item,i){
        const nombre=typeof item==='string'?item:item.nombre;
        const acceso=typeof item==='object'&&item.acceso!==undefined?item.acceso:undefined;
        return (
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,padding:'5px 8px',background:'#030e05',borderRadius:4,
            border:'1px solid '+(acceso===false?'#ff222218':acceso===true?c+'22':'#00ff2210')}}>
            {showCheck&&<div onClick={function(){if(canEdit)onToggle(i);}}
              style={{width:16,height:16,borderRadius:3,border:'1.5px solid '+(acceso?c:'#444'),background:acceso?c+'25':'transparent',
                display:'flex',alignItems:'center',justifyContent:'center',cursor:canEdit?'pointer':'default',flexShrink:0}}>
              {acceso&&<span style={{fontSize:10,color:c,lineHeight:1}}>v</span>}
            </div>}
            <span style={{flex:1,fontSize:9,color:acceso===false?'#ff222270':'#00ff22',wordBreak:'break-all'}}>{nombre}</span>
            {canEdit&&<span onClick={function(){onDel(i);}}
              style={{cursor:'pointer',fontSize:10,color:'#ff222240',flexShrink:0}}
              onMouseOver={function(e){e.target.style.color='#ff2222';}}
              onMouseOut={function(e){e.target.style.color='#ff222240';}}>X</span>}
          </div>
        );
      })}
      {canEdit&&(adding
        ?<div style={{display:'flex',gap:6,marginTop:6}}>
          <input autoFocus value={newVal} onChange={function(e){setNewVal(e.target.value);}}
            placeholder="Escribir y Enter..."
            onKeyDown={function(e){if(e.key==='Enter')commit();if(e.key==='Escape')setAdding(false);}}
            style={{flex:1,background:'#0a180a',border:'1px solid '+c+'40',color:'#00ff22',fontFamily:'monospace',fontSize:10,padding:'5px 8px',borderRadius:4,outline:'none'}}/>
          <button onClick={commit} style={{padding:'4px 10px',background:c+'18',border:'1px solid '+c,color:c,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>OK</button>
          <button onClick={function(){setAdding(false);}} style={{padding:'4px 8px',background:'transparent',border:'1px solid #333',color:'#555',fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>X</button>
        </div>
        :<button onClick={function(){setAdding(true);}}
          style={{marginTop:6,padding:'4px 10px',background:'transparent',border:'1px dashed '+c+'35',color:c,opacity:.6,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4,width:'100%'}}
          onMouseOver={function(e){e.currentTarget.style.opacity='1';}}
          onMouseOut={function(e){e.currentTarget.style.opacity='.6';}}>+ Agregar</button>
      )}
    </div>
  );
}

function PCModal(props){

      <MatrixRain opacity={.65}/>
      <div style={{position:'relative',zIndex:10,width:400}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:30,fontWeight:900,letterSpacing:8,color:'#00ff22',textShadow:'0 0 30px #00ff22'}}>NETGRID</div>
          <div style={{fontSize:8,letterSpacing:5,color:'#00ff22',opacity:.35,marginTop:4}}>NETWORK ADMIN v6.0</div>
        </div>
        <div style={{background:'rgba(3,14,5,.97)',border:'1px solid #00ff2220',borderRadius:12,padding:'32px 36px',backdropFilter:'blur(10px)'}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.35,marginBottom:6}}>USUARIO</div>
            <input value={user} onChange={function(e){setUser(e.target.value);}} style={inp} placeholder="usuario"
              onKeyDown={function(e){if(e.key==='Enter')go();}}
              onFocus={function(e){e.target.style.borderColor='#00ff22';}}
              onBlur={function(e){e.target.style.borderColor='#00ff2220';}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.35,marginBottom:6}}>CONTRASENA</div>
            <input type="password" value={pass} onChange={function(e){setPass(e.target.value);}} style={inp} placeholder="..."
              onKeyDown={function(e){if(e.key==='Enter')go();}}
              onFocus={function(e){e.target.style.borderColor='#00ff22';}}
              onBlur={function(e){e.target.style.borderColor='#00ff2220';}}/>
          </div>
          {err&&<div style={{fontSize:9,color:'#ff2222',letterSpacing:2,marginBottom:10,textAlign:'center'}}>{err}</div>}
          <button onClick={go} disabled={load} style={{width:'100%',padding:'12px',marginTop:12,background:'#0a1a0a',border:'1px solid #00ff22',color:'#00ff22',fontFamily:'monospace',fontSize:10,letterSpacing:4,cursor:load?'wait':'pointer',borderRadius:4,transition:'all .2s'}}
            onMouseOver={function(e){e.target.style.background='#0f2210';}}
            onMouseOut={function(e){e.target.style.background='#0a1a0a';}}>
            {load?'VERIFICANDO...':'INICIAR SESION'}
          </button>
          <div style={{marginTop:20,padding:'10px',background:'#020c04',border:'1px solid #00ff2210',borderRadius:5}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.25,marginBottom:7}}>CUENTAS DEMO</div>
            {ACCS.map(function(a){return (
              <div key={a.id} onClick={function(){setUser(a.username);setPass(a.password);snd.click();}}
                style={{display:'flex',justifyContent:'space-between',padding:'4px 7px',marginBottom:2,borderRadius:3,cursor:'pointer'}}
                onMouseOver={function(e){e.currentTarget.style.background='#00ff2208';}}
                onMouseOut={function(e){e.currentTarget.style.background='transparent';}}>
                <span style={{fontSize:8,color:'#00ff22',opacity:.55}}>{a.username}</span>
                <span style={{fontSize:8,color:RC[a.role],letterSpacing:2}}>{a.role}</span>
                <span style={{fontSize:8,color:'#00ff22',opacity:.25}}>{a.password}</span>
              </div>
            );})}
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [cu,setCu]=useState(null);
  const [rows,setRows]=useState(function(){return [];});
  const [editPC,setEditPC]=useState(null);
  const [histPC,setHistPC]=useState(null);
  const [bajaPC,setBajaPC]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [drag,setDrag]=useState(null);
  const [toast,setToast]=useState(null);
  const [logs,setLogs]=useState([{t:nowT(),msg:'Sistema iniciado',type:'ok'}]);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('ALL');
  const [sfilt,setSfilt]=useState('ALL');
  const [panel,setPanel]=useState('LOGS');
  const [pinging,setPinging]=useState(false);
  const [selIds,setSelIds]=useState(new Set());
  const [time,setTime]=useState(nowT());
  const toastRef=useRef(null);
  const snd=useSound();

  useEffect(function(){
    var t=setInterval(function(){setTime(nowT());},1000);
    return function(){clearInterval(t);};
  },[]);

  useEffect(function(){
    var idx=0;
    var t=setInterval(function(){
      setRows(function(prev){
        if(!prev.length)return prev;
        var ri=idx%prev.length;idx++;
        var next=prev.slice();
        next[ri]=Object.assign({},next[ri],{pcs:next[ri].pcs.map(function(pc){
          if(pc.status!=='ACTIVO')return pc;
          return Object.assign({},pc,{ping:rndPing(),cpu:Math.min(100,Math.max(1,(pc.cpu+(Math.random()*8-4))|0)),ram:Math.min(100,Math.max(1,(pc.ram+(Math.random()*5-2))|0))});
        })});
        return next;
      });
    },800);
    return function(){clearInterval(t);};
  },[]);

  function addLog(msg,type){
    setLogs(function(p){return [{t:nowT(),msg:msg,type:type||'ok'},...p.slice(0,79)];});
  }
  function showToast(msg,type){
    if(toastRef.current)clearTimeout(toastRef.current);
    setToast({msg:msg,type:type||'ok'});
    toastRef.current=setTimeout(function(){setToast(null);},2500);
  }

  var allPCs=useMemo(function(){return rows.flatMap(function(r){return r.pcs;});},[ rows]);
  var stats=useMemo(function(){
    var act=allPCs.filter(function(p){return p.status==='ACTIVO';});
    var wp=allPCs.filter(function(p){return p.ping;});
    return {
      total:allPCs.length,active:act.length,
      maint:allPCs.filter(function(p){return p.status==='MANTENIMIENTO';}).length,
      baja:allPCs.filter(function(p){return p.status==='BAJA';}).length,
      alerts:allPCs.filter(function(p){return p.alerts&&p.alerts.length>0;}).length,
      bl_si:allPCs.filter(function(p){return blNum(p.bitlocker)===1;}).length,
      bl_no:allPCs.filter(function(p){return blNum(p.bitlocker)===0;}).length,
      avgPing:wp.length?Math.round(wp.reduce(function(a,p){return a+p.ping;},0)/wp.length):0,
      avgCPU:act.length?Math.round(act.reduce(function(a,p){return a+p.cpu;},0)/act.length):0,
      avgRAM:act.length?Math.round(act.reduce(function(a,p){return a+p.ram;},0)/act.length):0,
    };
  },[allPCs]);
  var pct=Math.round(stats.active/Math.max(stats.total,1)*100);
  var perms=cu?PERMS[cu.role]:{};

  var filtRows=useMemo(function(){
    var has=search||filter!=='ALL'||sfilt!=='ALL';
    if(!has)return rows;
    return rows.map(function(row){
      return Object.assign({},row,{pcs:row.pcs.filter(function(pc){
        if(filter==='ONLINE'&&pc.status!=='ACTIVO')return false;
        if(filter==='OFFLINE'&&pc.status==='ACTIVO')return false;
        if(filter==='ALERT'&&!(pc.alerts&&pc.alerts.length))return false;
        if(sfilt==='BL1'&&blNum(pc.bitlocker)!==1)return false;
        if(sfilt==='BL0'&&blNum(pc.bitlocker)!==0)return false;
        if(sfilt==='BL2'&&blNum(pc.bitlocker)!==2)return false;
        if(sfilt!=='ALL'&&sfilt!=='BL0'&&sfilt!=='BL1'&&sfilt!=='BL2'&&pc.status!==sfilt)return false;
        if(search){var s=search.toLowerCase();if(!pc.name.toLowerCase().includes(s)&&!pc.ip.includes(s)&&!(pc.user||'').toLowerCase().includes(s)&&!(pc.mac||'').toLowerCase().includes(s))return false;}
        return true;
      })});
    }).filter(function(r){return r.pcs.length>0;});
  },[rows,search,filter,sfilt]);

  function handleLogin(acc){setCu(acc);addLog(acc.name+' inicio sesion ['+acc.role+']','ok');showToast('Bienvenido, '+acc.name);}
  function handleLogout(){addLog(cu.name+' cerro sesion','warn');snd.logout();setCu(null);}

  function handleSave(upd){
    var old=allPCs.find(function(p){return p.id===upd.id;});
    var changes=[];
    if(old.name!==upd.name)changes.push({field:'Nombre',from:old.name,to:upd.name});
    if(old.ip!==upd.ip)changes.push({field:'IP',from:old.ip,to:upd.ip});
    if((old.mac||'')!==(upd.mac||''))changes.push({field:'MAC',from:old.mac||'--',to:upd.mac||'--'});
    if(blNum(old.bitlocker)!==blNum(upd.bitlocker))changes.push({field:'BitLocker',from:BLLABEL[blNum(old.bitlocker)],to:BLLABEL[blNum(upd.bitlocker)]});
    if(old.status!==upd.status)changes.push({field:'Estado',from:old.status,to:upd.status});
    if(old.email!==upd.email)changes.push({field:'Correo',from:old.email||'--',to:upd.email||'--'});
    if(old.office365!==upd.office365)changes.push({field:'Office365',from:String(old.office365),to:String(upd.office365)});
    var entry=changes.length>0?{action:'EDITADO',changes:changes,user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}:null;
    var final=entry?Object.assign({},upd,{history:[...upd.history,entry]}):upd;
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return pc.id===upd.id?final:pc;})});});});
    setEditPC(null);
    if(entry)addLog(cu.name+' edito '+upd.name,'ok');
    showToast(upd.name+' guardado');
  }

  function handleDelete(id){
    var pc=allPCs.find(function(p){return p.id===id;});
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.filter(function(pc){return pc.id!==id;})});});});
    setEditPC(null);
    addLog(cu.name+' ELIMINO '+(pc?pc.name:id),'warn');showToast('Eliminado','warn');snd.del();
  }

  function handleBaja(reason){
    var pc=bajaPC;
    var entry={action:'DADO DE BAJA: '+reason,changes:[{field:'Estado',from:pc.status,to:'BAJA'},{field:'Motivo',from:'--',to:reason}],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()};
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(p2){return p2.id===pc.id?Object.assign({},p2,{status:'BAJA',ping:null,bajaReason:reason,history:[...p2.history,entry]}):p2;})});});});
    setBajaPC(null);setEditPC(null);
    addLog(cu.name+' BAJA '+pc.name+': '+reason,'warn');showToast(pc.name+' baja','warn');snd.warn();
  }

  function handleAddRows(qty,perRow){
    setRows(function(prev){
      var start=prev.length;
      var newRows=Array.from({length:qty},function(_,ri){
        return {id:uid(),label:'Fila '+(start+ri+1),pcs:Array.from({length:perRow},function(_,c){
          return Object.assign(mkPC(start+ri,c),{addedBy:cu.username,addedAt:new Date().toISOString(),history:[{action:'CREADO',changes:[],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}]});
        })};
      });
      return [...prev,...newRows];
    });
    setShowAdd(false);
    addLog(cu.name+' creo '+qty+' fila(s) x '+perRow+' = '+(qty*perRow)+' PCs','ok');
    showToast((qty*perRow)+' equipos creados');snd.ok();
  }

  function handleAddPC(rowId){
    setRows(function(prev){
      var ri=prev.findIndex(function(r){return r.id===rowId;}),ci=prev[ri].pcs.length;
      var npc=Object.assign(mkPC(ri,ci),{id:uid(),name:'PC-'+String(ri+1).padStart(2,'0')+String(ci+1).padStart(2,'0'),ip:'192.168.'+String(ri+1)+'.'+String(ci+1),addedBy:cu.username,addedAt:new Date().toISOString(),history:[{action:'AGREGADO',changes:[],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}]});
      return prev.map(function(r,i){return i===ri?Object.assign({},r,{pcs:[...r.pcs,npc]}):r;});
    });
    addLog(cu.name+' agrego PC','ok');showToast('PC agregado');snd.ok();
  }

  function handleDelRow(rowId){
    var row=rows.find(function(r){return r.id===rowId;});
    setRows(function(p){return p.filter(function(r){return r.id!==rowId;});});
    addLog(cu.name+' elimino '+(row?row.label:rowId),'warn');showToast('Fila eliminada','warn');snd.del();
  }

  function handleRowPwr(rIdx,status){
    setRows(function(p){return p.map(function(r,i){return i===rIdx?Object.assign({},r,{pcs:r.pcs.map(function(pc){return Object.assign({},pc,{status:status,ping:status==='ACTIVO'?rndPing():null});})}):r;});});
    addLog(cu.name+': Fila '+(rIdx+1)+' -> '+status,'ok');snd.click();
  }

  function handlePingAll(){
    setPinging(true);addLog(cu.name+' ping masivo','ok');snd.ping();
    setTimeout(function(){
      setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return pc.status==='ACTIVO'?Object.assign({},pc,{ping:rndPing()}):pc;})});});});
      addLog('Ping OK: '+stats.active+'/'+stats.total,'ok');showToast('Ping completado');snd.ok();setPinging(false);
    },1400);
  }

  function handleDragStart(e,pc){setDrag(pc);e.dataTransfer.effectAllowed='move';}
  function handleDrop(e,target){
    e.preventDefault();if(!drag||drag.id===target.id)return;
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){
      if(pc.id===drag.id)return Object.assign({},pc,{name:target.name,ip:target.ip,status:target.status,user:target.user,ping:target.ping,cpu:target.cpu,ram:target.ram});
      if(pc.id===target.id)return Object.assign({},pc,{name:drag.name,ip:drag.ip,status:drag.status,user:drag.user,ping:drag.ping,cpu:drag.cpu,ram:drag.ram});
      return pc;
    })});});});
    addLog(cu.name+' movio '+drag.name+' - '+target.name,'ok');snd.move();setDrag(null);
  }

  function toggleSel(id){snd.click();setSelIds(function(p){var n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}

  if(!cu)return <Login onLogin={handleLogin} snd={snd}/>;

  function fb(active,col){return {padding:'4px 10px',background:active?col+'15':'transparent',border:'1px solid '+(active?col+'70':col+'25'),color:active?col:col+'50',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:3,transition:'all .12s'};}

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#020c04',fontFamily:"'Share Tech Mono',monospace",color:'#00ff22',overflow:'hidden',position:'relative'}}>
      <MatrixRain opacity={.35}/>

      <div style={{position:'relative',zIndex:10,background:'rgba(2,10,4,.97)',borderBottom:'1px solid #00ff2212',backdropFilter:'blur(4px)'}}>
        <div style={{display:'flex',alignItems:'center',padding:'8px 18px',gap:14,flexWrap:'wrap'}}>
          <div style={{flexShrink:0}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:16,fontWeight:900,letterSpacing:6,color:'#00ff22',textShadow:'0 0 18px #00ff22'}}>NETGRID</div>
            <div style={{fontSize:7,letterSpacing:4,color:'#00ff22',opacity:.3}}>NETWORK ADMIN v6.0</div>
          </div>
          <div style={{width:1,height:32,background:'#00ff2210',flexShrink:0}}/>
          <div style={{flexShrink:0,textAlign:'center'}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:14,letterSpacing:3,color:'#00ff22'}}>{time}</div>
            <div style={{fontSize:7,opacity:.3}}>{new Date().toLocaleDateString('es-MX')}</div>
          </div>
          <div style={{width:1,height:32,background:'#00ff2210',flexShrink:0}}/>
          <div style={{display:'flex',gap:12,flex:1,flexWrap:'wrap'}}>
            {[{l:'TOTAL',v:stats.total,c:'#00ff22'},{l:'ACTIVOS',v:stats.active,c:'#00ff22'},{l:'MANT',v:stats.maint,c:'#ffff00'},{l:'BAJA',v:stats.baja,c:'#ff2222'},{l:'ALERTAS',v:stats.alerts,c:'#ff8800'},{l:'BL ON',v:stats.bl_si,c:'#00ff22'},{l:'BL OFF',v:stats.bl_no,c:'#ff2222'},{l:'CPU',v:stats.avgCPU+'%',c:stats.avgCPU>80?'#ff2222':'#00ff22'},{l:'RAM',v:stats.avgRAM+'%',c:stats.avgRAM>80?'#ff2222':'#00aaff'},{l:'PING',v:stats.avgPing+'ms',c:stats.avgPing<30?'#00ff22':'#ffff00'}].map(function(item){return (
              <div key={item.l} style={{textAlign:'center',minWidth:40}}>
                <div style={{fontSize:6,letterSpacing:1,opacity:.3,marginBottom:1}}>{item.l}</div>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:13,fontWeight:700,color:item.c,textShadow:'0 0 5px '+item.c}}>{item.v}</div>
              </div>
            );})}
          </div>
          <div style={{flexShrink:0,minWidth:80}}>
            <div style={{fontSize:6,opacity:.3,marginBottom:2,textAlign:'center'}}>DISPONIB.</div>
            <div style={{height:4,background:'#0a1a0a',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#0a2,#00ff22)',transition:'width .6s'}}/>
            </div>
            <div style={{fontSize:9,textAlign:'center',marginTop:1,color:'#00ff22',fontFamily:"'Orbitron',monospace"}}>{pct+'%'}</div>
          </div>
          <div style={{width:1,height:32,background:'#00ff2210',flexShrink:0}}/>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:RC[cu.role]+'18',border:'1.5px solid '+RC[cu.role],display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:RC[cu.role],fontWeight:700}}>{cu.avatar}</div>
            <div>
              <div style={{fontSize:9,color:RC[cu.role]}}>{cu.name}</div>
              <div style={{fontSize:6,opacity:.35}}>{cu.role+' - '+cu.dept}</div>
            </div>
            <button onClick={handleLogout} style={{padding:'4px 9px',background:'transparent',border:'1px solid #ff222225',color:'#ff222250',fontFamily:'inherit',fontSize:9,cursor:'pointer',borderRadius:3}}
              onMouseOver={function(e){e.target.style.borderColor='#ff2222';e.target.style.color='#ff2222';}}
              onMouseOut={function(e){e.target.style.borderColor='#ff222225';e.target.style.color='#ff222250';}}>OFF</button>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',padding:'6px 18px',gap:7,borderTop:'1px solid #00ff2208',flexWrap:'wrap'}}>
          <div style={{position:'relative',display:'flex',alignItems:'center'}}>
            <span style={{position:'absolute',left:8,fontSize:10,opacity:.3,pointerEvents:'none'}}>?</span>
            <input placeholder="PC / IP / USUARIO..." value={search} onChange={function(e){setSearch(e.target.value);}}
              style={{background:'#0a160a',border:'1px solid #00ff2215',color:'#00ff22',fontFamily:'inherit',fontSize:9,padding:'5px 9px 5px 22px',borderRadius:4,outline:'none',width:200}}
              onFocus={function(e){e.target.style.borderColor='#00ff22';}}
              onBlur={function(e){e.target.style.borderColor='#00ff2215';}}/>
            {search&&<span onClick={function(){setSearch('');}} style={{position:'absolute',right:7,cursor:'pointer',opacity:.4,fontSize:9}}>X</span>}
          </div>
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          {[{f:'ALL',l:'TODOS'},{f:'ONLINE',l:'ON'},{f:'OFFLINE',l:'OFF'},{f:'ALERT',l:'ALERTA'}].map(function(item){return (
            <button key={item.f} onClick={function(){setFilter(item.f);snd.click();}} style={fb(filter===item.f,'#00ff22')}>{item.l}</button>
          );})}
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          {STLIST.map(function(st){return (
            <button key={st} onClick={function(){setSfilt(function(p){return p===st?'ALL':st;});snd.click();}} style={fb(sfilt===st,SC[st])}>{st}</button>
          );})}
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          {[[1,'BL:ON','#00ff22'],[0,'BL:OFF','#ff2222'],[2,'BL:?','#ffff00']].map(function(it){
            var v=it[0],l=it[1],c=it[2],k='BL'+v;
            return <button key={v} onClick={function(){setSfilt(function(p){return p===k?'ALL':k;});snd.click();}} style={fb(sfilt===k,c)}>{l}</button>;
          })}
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          <button onClick={handlePingAll} disabled={pinging} style={{padding:'4px 12px',background:'#0a1a0a',border:'1px solid #00ff2225',color:'#00ff22',fontFamily:'inherit',fontSize:8,cursor:'pointer',borderRadius:3,display:'flex',alignItems:'center',gap:4}}>
            <span style={{display:'inline-block',animation:pinging?'spin .7s linear infinite':'none'}}>{pinging?'...':'O'}</span>
            PING
          </button>
          {perms.add&&<button onClick={function(){setShowAdd(true);snd.click();}} style={{padding:'4px 12px',background:'#0a1a0a',border:'1px solid #00ff2225',color:'#00ff22',fontFamily:'inherit',fontSize:8,cursor:'pointer',borderRadius:3}}>+ FILAS</button>}
          {selIds.size>0&&<React.Fragment>
            <div style={{width:1,height:20,background:'#00ff2210'}}/>
            <span style={{fontSize:8,color:'#00aaff'}}>{selIds.size+' SEL'}</span>
            {perms.edit&&<React.Fragment>
              <button onClick={function(){setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return selIds.has(pc.id)?Object.assign({},pc,{status:'ACTIVO',ping:rndPing()}):pc;})});});});addLog(cu.name+' activo '+selIds.size+' PCs','ok');setSelIds(new Set());snd.ok();}} style={fb(false,'#00ff22')}>ON</button>
              <button onClick={function(){setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return selIds.has(pc.id)?Object.assign({},pc,{status:'MANTENIMIENTO',ping:null}):pc;})});});});addLog(cu.name+': '+selIds.size+' en MANT','ok');setSelIds(new Set());snd.warn();}} style={fb(false,'#ffff00')}>MANT</button>
            </React.Fragment>}
            {perms.del&&<button onClick={function(){setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.filter(function(pc){return !selIds.has(pc.id);})});});});addLog(cu.name+' elimino '+selIds.size+' PCs','warn');setSelIds(new Set());snd.del();}} style={fb(false,'#ff2222')}>DEL</button>}
            <button onClick={function(){setSelIds(new Set());}} style={{padding:'4px 8px',background:'transparent',border:'1px solid #222',color:'#444',fontFamily:'inherit',fontSize:8,cursor:'pointer',borderRadius:3}}>X</button>
          </React.Fragment>}
        </div>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative',zIndex:5}}>
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'12px 16px'}}>
          {filtRows.map(function(row){return (
            <GridRow key={row.id} row={row} rIdx={rows.findIndex(function(r){return r.id===row.id;})} perms={perms} selIds={selIds} onEdit={setEditPC} onDragStart={handleDragStart} onDrop={handleDrop} onSel={toggleSel} onAddPC={handleAddPC} onDelRow={handleDelRow} onRowPwr={handleRowPwr} snd={snd}/>
          );})}
          {filtRows.length===0&&<div style={{textAlign:'center',padding:'60px 20px',opacity:.2,fontSize:11,letterSpacing:3}}>{search||filter!=='ALL'||sfilt!=='ALL'?'SIN RESULTADOS':'SIN FILAS - PRESIONA + FILAS'}</div>}
        </div>

        <div style={{width:250,borderLeft:'1px solid #00ff2212',background:'rgba(2,10,4,.96)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{display:'flex',borderBottom:'1px solid #00ff2212',flexShrink:0}}>
            {['LOGS','STATS','MAPA'].map(function(t){return (
              <button key={t} onClick={function(){setPanel(t);snd.click();}} style={{flex:1,padding:'9px 0',background:panel===t?'#00ff2206':'transparent',border:'none',borderBottom:panel===t?'2px solid #00ff22':'2px solid transparent',color:panel===t?'#00ff22':'#00ff2230',fontFamily:'inherit',fontSize:7,letterSpacing:3,cursor:'pointer',transition:'all .15s'}}>{t}</button>
            );})}
          </div>
          {panel==='LOGS'&&<div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
            <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:9}}>AUDITORIA</div>
            {logs.map(function(l,i){return (
              <div key={i} style={{display:'flex',gap:6,marginBottom:6,opacity:Math.max(.15,1-i*.013),animation:i===0?'fadein .25s ease':'none'}}>
                <span style={{color:'#00ff22',opacity:.25,whiteSpace:'nowrap',flexShrink:0,fontSize:7}}>{l.t}</span>
                <span style={{fontSize:8,color:l.type==='warn'?'#ff8800':'#00ff22',wordBreak:'break-word'}}>{l.type==='warn'?'! ':''}{l.msg}</span>
              </div>
            );})}
          </div>}
          {panel==='STATS'&&<div style={{flex:1,overflowY:'auto',padding:'12px'}}>
            <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:12}}>METRICAS</div>
            {[{l:'DISPONIBILIDAD',v:pct+'%',c:'#00ff22',b:pct},{l:'CPU PROM',v:stats.avgCPU+'%',c:stats.avgCPU>80?'#ff2222':'#ffff00',b:stats.avgCPU},{l:'RAM PROM',v:stats.avgRAM+'%',c:stats.avgRAM>80?'#ff2222':'#00aaff',b:stats.avgRAM},{l:'PING PROM',v:stats.avgPing+'ms',c:stats.avgPing<30?'#00ff22':'#ffff00',b:Math.min(100,stats.avgPing)}].map(function(item){return (
              <div key={item.l} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:7,opacity:.3}}>{item.l}</span>
                  <span style={{fontSize:11,color:item.c,fontWeight:700}}>{item.v}</span>
                </div>
                <div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',width:item.b+'%',background:item.c,borderRadius:2,transition:'width .8s'}}/>
                </div>
              </div>
            );})}
            <div style={{marginTop:14,padding:'10px',background:'#020c04',border:'1px solid #00ff2210',borderRadius:5}}>
              <div style={{fontSize:6,opacity:.25,marginBottom:9}}>POR ESTADO</div>
              {STLIST.map(function(st){var cnt=allPCs.filter(function(p){return p.status===st;}).length;var b2=Math.round(cnt/Math.max(allPCs.length,1)*100);return (
                <div key={st} style={{marginBottom:7}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:7,color:SC[st]}}>{st}</span>
                    <span style={{fontSize:8,color:SC[st],fontWeight:700}}>{cnt}</span>
                  </div>
                  <div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:b2+'%',background:SC[st],transition:'width .5s'}}/>
                  </div>
                </div>
              );})}
            </div>
          </div>}
          {panel==='MAPA'&&<div style={{flex:1,overflowY:'auto',padding:'12px'}}>
            <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>MAPA DE RED</div>
            <div style={{fontSize:7,opacity:.2,marginBottom:10}}>{stats.total+' EQ - '+rows.length+' FILAS'}</div>
            {rows.map(function(row){return (
              <div key={row.id} style={{marginBottom:10}}>
                <div style={{fontSize:6,opacity:.25,marginBottom:4}}>{row.label.toUpperCase()+' ('+row.pcs.length+')'}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
                  {row.pcs.map(function(pc){return (
                    <div key={pc.id} title={pc.name+' '+pc.ip+' '+pc.status}
                      onClick={function(){setEditPC(pc);snd.click();}}
                      style={{width:12,height:12,borderRadius:1,cursor:'pointer',background:SC[pc.status],boxShadow:pc.status==='ACTIVO'?'0 0 3px #00ff22':'none',opacity:pc.status==='ACTIVO'?1:.45,transition:'all .3s'}}/>
                  );})}
                </div>
              </div>
            );})}
            <div style={{marginTop:10,padding:'8px',background:'#030e05',border:'1px solid #00ff2210',borderRadius:4}}>
              {STLIST.map(function(st){return (
                <div key={st} style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                  <div style={{width:9,height:9,borderRadius:1,background:SC[st]}}/>
                  <span style={{fontSize:7,color:SC[st],opacity:.65}}>{st+' ('+allPCs.filter(function(p){return p.status===st;}).length+')'}</span>
                </div>
              );})}
            </div>
          </div>}
        </div>
      </div>

      <div style={{position:'relative',zIndex:10,borderTop:'1px solid #00ff2210',background:'rgba(2,10,4,.97)',padding:'4px 18px',display:'flex',gap:16,alignItems:'center',fontSize:7,letterSpacing:2,color:'#00ff22',opacity:.4}}>
        <span style={{animation:'pulse 1.5s infinite'}}>o</span>
        <span>ACTIVO</span>
        <span>{'ROL: '}<span style={{color:RC[cu.role]}}>{cu.role}</span></span>
        <span>{'FILAS: '+rows.length}</span>
        <span>{'TOTAL: '+stats.total}</span>
        <span>{'ON: '+stats.active}</span>
        <span>{'BAJA: '}<span style={{color:'#ff2222'}}>{stats.baja}</span></span>
        <div style={{flex:1}}/>
        {!perms.edit&&<span style={{color:'#ffff00'}}>SOLO LECTURA</span>}
        <span style={{animation:'blink 1s infinite'}}>_</span>
      </div>

      {toast&&<div style={{position:'fixed',bottom:26,right:26,zIndex:5000,background:'rgba(3,14,5,.97)',border:'1px solid '+(toast.type==='warn'?'#ff2222':'#00ff22'),color:toast.type==='warn'?'#ff2222':'#00ff22',padding:'9px 20px',borderRadius:4,fontFamily:'inherit',fontSize:9,letterSpacing:2,animation:'fadein .2s ease'}}>
        {toast.type==='warn'?'! ':''}{toast.msg.toUpperCase()}
      </div>}

      {editPC&&!bajaPC&&<PCModal pc={editPC} onClose={function(){setEditPC(null);}} onSave={handleSave} onDelete={handleDelete} onBaja={function(pc){setBajaPC(pc);}} onHist={setHistPC} cu={cu} snd={snd}/>}
      {bajaPC&&<BajaModal pc={bajaPC} onClose={function(){setBajaPC(null);}} onConfirm={handleBaja}/>}
      {histPC&&<HistModal pc={histPC} onClose={function(){setHistPC(null);}}/>}
      {showAdd&&<AddModal onClose={function(){setShowAdd(false);}} onAdd={handleAddRows}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>

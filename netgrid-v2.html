function useSound(){
  const ctx=useRef(null);
  function go(f,d,t,v){
    try{
      if(!ctx.current) ctx.current=new (window.AudioContext||window.webkitAudioContext)();
      const o=ctx.current.createOscillator(),g=ctx.current.createGain();
      o.connect(g);g.connect(ctx.current.destination);
      o.type=t;o.frequency.setValueAtTime(f,ctx.current.currentTime);
      g.gain.setValueAtTime(v,ctx.current.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.current.currentTime+d);
      o.start();o.stop(ctx.current.currentTime+d);
    }catch(e){}
  }
  return {
    click:function(){go(800,.05,'square',.06);},
    save:function(){go(600,.05,'sine',.06);setTimeout(function(){go(900,.08,'sine',.06);},60);},
    del:function(){go(300,.12,'sawtooth',.08);setTimeout(function(){go(180,.15,'sawtooth',.06);},80);},
    login:function(){[300,500,700,900].forEach(function(f,i){setTimeout(function(){go(f,.1,'sine',.05);},i*70);});},
    logout:function(){[900,600,400,200].forEach(function(f,i){setTimeout(function(){go(f,.1,'sine',.05);},i*60);});},
    warn:function(){go(440,.1,'square',.09);setTimeout(function(){go(440,.1,'square',.09);},200);},
    ping:function(){go(1200,.04,'sine',.05);},
    move:function(){go(500,.05,'triangle',.06);},
    ok:function(){go(700,.06,'sine',.06);setTimeout(function(){go(1000,.1,'sine',.07);},70);},
  };
}

var MatrixRain=memo(function MatrixRain(props){
  const ref=useRef(null);
  useEffect(function(){
    const cv=ref.current;if(!cv)return;
    const cx=cv.getContext('2d');
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    const fs=13,cols=Math.floor(cv.width/fs),drops=Array(cols).fill(1);
    const chars='0123456789ABCDEF';
    let fr,last=0;
    function draw(ts){
      if(ts-last>60){
        last=ts;
        cx.fillStyle='rgba(2,12,4,.05)';cx.fillRect(0,0,cv.width,cv.height);
        drops.forEach(function(y,i){
          cx.fillStyle='rgba(0,255,34,'+(Math.random()*.05+.015)+')';
          cx.font=fs+'px monospace';
          cx.fillText(chars[Math.floor(Math.random()*chars.length)],i*fs,y*fs);
          if(y*fs>cv.height&&Math.random()>.975)drops[i]=0;
          drops[i]++;
        });
      }
      fr=requestAnimationFrame(draw);
    }
    fr=requestAnimationFrame(draw);
    return function(){cancelAnimationFrame(fr);};
  },[]);
  return React.createElement('canvas',{ref:ref,style:{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,opacity:props.opacity||.4}});
});

function PCCard(props){
  const {pc,onEdit,onDragStart,onDrop,selected,onSelect,canEdit,snd}=props;
  const [hov,setHov]=useState(false);
  const isElim=pc.status==='ELIMINADO';
  const sc=isElim?'#444':SC[pc.status]||'#00ff22';
  const hasAlert=!isElim&&pc.alerts&&pc.alerts.length>0;
  return (
    <div
      draggable={canEdit&&!isElim}
      onDragStart={function(e){if(canEdit&&!isElim){onDragStart(e,pc);snd.move();}}}
      onDragOver={function(e){e.preventDefault();}}
      onDrop={function(e){if(!isElim)onDrop(e,pc);}}
      onMouseEnter={function(){setHov(true);}}

        boxShadow:hov&&!isElim?'0 0 10px '+sc+'20':selected?'0 0 8px #00aaff25':'none'}}>
      {isElim&&<div style={{position:'absolute',inset:0,borderRadius:6,background:'repeating-linear-gradient(45deg,transparent,transparent 8px,#1a1a1a08 8px,#1a1a1a08 9px)'}}/>}
      <div style={{position:'absolute',top:4,right:5,width:6,height:6,borderRadius:'50%',
        background:sc,animation:'none'}}/>
      {isElim&&<div style={{position:'absolute',top:4,left:4,fontSize:6,color:'#555',padding:'1px 4px',borderRadius:2,border:'1px solid #2a2a2a',background:'#111',letterSpacing:1}}>DEL</div>}
      {!isElim&&hasAlert&&<div style={{position:'absolute',top:4,left:4,background:'#ff8800',color:'#000',fontSize:7,fontWeight:700,padding:'1px 4px',borderRadius:2}}>!</div>}
      {!isElim&&pc.status!=='ACTIVO'&&<div style={{position:'absolute',top:4,left:hasAlert?14:4,fontSize:6,color:sc,padding:'1px 4px',borderRadius:2,border:'1px solid '+sc+'30',background:sc+'12'}}>
        {pc.status==='MANTENIMIENTO'?'MANT':pc.status==='BAJA'?'BAJA':'REMP'}
      </div>}
      {!isElim&&<div onClick={function(e){e.stopPropagation();onSelect(pc.id);snd.click();}}
        style={{position:'absolute',bottom:4,right:4,width:10,height:10,borderRadius:2,
          border:'1px solid '+(selected?'#00aaff':'#2a2a2a'),background:selected?'#00aaff':'transparent',
          cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#000'}}>
        {selected?'v':''}
      </div>}
      <svg viewBox="0 0 44 38" width="36" height="30" fill="none">
        <rect x="3" y="3" width="38" height="24" rx="2.5" fill={isElim?'#080808':'#100608'} stroke={sc} strokeWidth="1.4" opacity=".9"/>
        <rect x="6" y="6" width="32" height="18" rx="1" fill="#020a02" stroke={sc} strokeWidth=".5" opacity=".6"/>
        {!isElim&&<rect x="7" y="7.5" width={Math.max(1,(pc.cpu||0)*.3)} height="3" rx=".5" fill={pc.cpu>80?'#ff2222':pc.cpu>50?'#ffff00':'#00ff22'} opacity=".8"/>}
        {isElim&&<line x1="8" y1="8" x2="36" y2="28" stroke="#333" strokeWidth="1.5" opacity=".6"/>}
        {isElim&&<line x1="36" y1="8" x2="8" y2="28" stroke="#333" strokeWidth="1.5" opacity=".6"/>}
        <rect x="18" y="27" width="8" height="3" rx=".5" fill={sc} opacity=".28"/>
        <circle cx="22" cy="28.5" r=".9" fill={sc} opacity=".25"/>
      </svg>
      <div style={{fontSize:8,color:isElim?'#444':sc,marginTop:2,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{pc.name}</div>
      <div style={{fontSize:7,color:isElim?'#333':'#0a2',opacity:.45,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pc.ip}</div>
      {!isElim&&pc.mac&&<div style={{fontSize:6,color:'#00ccff',opacity:.55,maxWidth:78,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{pc.mac}</div>}

      {!isElim&&pc.status==='ACTIVO'&&pc.ping&&<span style={{fontSize:7,color:pc.ping<20?'#00ff22':pc.ping<50?'#ffff00':'#ff8800'}}>{pc.ping}ms</span>}
      {hov&&<div onClick={function(){onEdit(pc);snd.click();}}

          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer'}}>
        {isElim
          ?<React.Fragment>
            <span style={{fontSize:9,color:'#666',letterSpacing:2}}>VER HISTORIAL</span>

            <span style={{fontSize:10,color:sc,letterSpacing:2}}>{canEdit?'EDITAR':'VER'}</span>
            <span style={{fontSize:7,color:sc,opacity:.55}}>{pc.dept}</span>
            {pc.user&&<span style={{fontSize:7,color:'#0a2',opacity:.65}}>{pc.user}</span>}

  );
}

function GridRow(props){
  const {row,rIdx,perms,selIds,onEdit,onDragStart,onDrop,onSel,onAddPC,onDelRow,onRowPwr,onRename,snd}=props;
  const [page,setPage]=useState(0);
  const [editLabel,setEditLabel]=useState(false);
  const [labelVal,setLabelVal]=useState(row.label);
  const total=Math.ceil(row.pcs.length/PAGE);
  const shown=row.pcs.slice(page*PAGE,(page+1)*PAGE);
  const onPct=Math.round(row.pcs.filter(function(p){return p.status==='ACTIVO';}).length/Math.max(row.pcs.length,1)*100);
  const tb={padding:'2px 9px',background:'transparent',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:3,transition:'all .12s'};
  return (
    <div style={{marginBottom:12,background:row.eliminada?'rgba(8,8,8,.88)':'rgba(3,14,5,.88)',border:'1px solid '+(row.eliminada?'#2a2a2a':'#00ff2213'),borderRadius:8,padding:'10px 14px',opacity:row.eliminada? .6:1}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:8,gap:8,flexWrap:'wrap'}}>

          ?<input autoFocus value={labelVal} onChange={function(e){setLabelVal(e.target.value);}}
              onBlur={function(){if(labelVal.trim())onRename(row.id,labelVal.trim());setEditLabel(false);}}
              onKeyDown={function(e){if(e.key==='Enter'){if(labelVal.trim())onRename(row.id,labelVal.trim());setEditLabel(false);}if(e.key==='Escape')setEditLabel(false);}}
              style={{fontSize:10,letterSpacing:2,color:'#00ff22',background:'transparent',border:'none',borderBottom:'1px solid #00ff22',outline:'none',fontFamily:'monospace',width:120,padding:'0 2px'}}/>
          :<span onClick={function(){if(perms.edit&&!row.eliminada){setLabelVal(row.label);setEditLabel(true);}}}
              title={perms.edit?'Clic para editar':''}
              style={{fontSize:10,letterSpacing:3,color:row.eliminada?'#444':'#00ff22',flexShrink:0,cursor:perms.edit&&!row.eliminada?'text':'default'}}
            >{(row.eliminada?'x ':'>  ')+row.label.toUpperCase()}{row.eliminada&&<span style={{fontSize:7,color:'#444',marginLeft:6}}>[{row.eliminadaMotivo||'eliminada'}]</span>}
            {perms.edit&&!row.eliminada&&<span style={{fontSize:7,color:'#00ff2230',marginLeft:4}}>[editar]</span>}
          </span>}
        <span style={{fontSize:7,opacity:.3}}>{row.pcs.filter(function(p){return p.status==='ACTIVO';}).length+'/'+row.pcs.length}</span>
        <div style={{width:48,height:3,background:'#0a100a',borderRadius:2,overflow:'hidden',flexShrink:0}}>
          <div style={{height:'100%',width:onPct+'%',background:'linear-gradient(90deg,#0a2,#00ff22)',transition:'width .5s'}}/>
        </div>
        {total>1&&<div style={{display:'flex',alignItems:'center',gap:4}}>
          <button onClick={function(){setPage(function(p){return Math.max(0,p-1);});}} disabled={page===0} style={Object.assign({},tb,{border:'1px solid #00ff2220',color:page===0?'#333':'#00ff22'})}>{'<'}</button>
          <span style={{fontSize:8,color:'#00ff22',opacity:.4,minWidth:70,textAlign:'center'}}>{(page+1)+'/'+total+' - '+row.pcs.length+' PCs'}</span>
          <button onClick={function(){setPage(function(p){return Math.min(total-1,p+1);});}} disabled={page===total-1} style={Object.assign({},tb,{border:'1px solid #00ff2220',color:page===total-1?'#333':'#00ff22'})}>{'>'}</button>
        </div>}
        <div style={{flex:1}}/>
        {perms.edit&&<React.Fragment>
          <button onClick={function(){onRowPwr(rIdx,'ACTIVO');snd.click();}}
            style={Object.assign({},tb,{border:'1px solid #00ff2212',color:'#00ff2245'})}

            onMouseOut={function(e){e.target.style.borderColor='#00ff2212';e.target.style.color='#00ff2245';}}>ON</button>
          <button onClick={function(){onRowPwr(rIdx,'MANTENIMIENTO');snd.click();}}
            style={Object.assign({},tb,{border:'1px solid #ffff0012',color:'#ffff0040'})}

        </React.Fragment>}

function ItemList(props){

    <div>
      {items.length===0&&!adding&&<div style={{fontSize:9,opacity:.25,textAlign:'center',padding:'8px',letterSpacing:2}}>VACIO</div>}

        return (

            border:'1px solid '+(acceso===false?'#ff222218':acceso===true?c+'22':'#00ff2210')}}>
            {showCheck&&<div onClick={function(){if(canEdit)onToggle(i);}}
              style={{width:16,height:16,borderRadius:3,border:'1.5px solid '+(acceso?c:'#444'),background:acceso?c+'25':'transparent',
                display:'flex',alignItems:'center',justifyContent:'center',cursor:canEdit?'pointer':'default',flexShrink:0}}>
              {acceso&&<span style={{fontSize:10,color:c,lineHeight:1}}>v</span>}
            </div>}
            <span style={{flex:1,fontSize:9,color:acceso===false?'#ff222270':'#00ff22',wordBreak:'break-all'}}>{nombre}</span>
            {canEdit&&<span onClick={function(){onDel(i);}}
              style={{cursor:'pointer',fontSize:10,color:'#ff222240',flexShrink:0}}
              onMouseOver={function(e){e.target.style.color='#ff2222';}}
              onMouseOut={function(e){e.target.style.color='#ff222240';}}>X</span>}
          </div>
        );
      })}
      {canEdit&&(adding
        ?<div style={{display:'flex',gap:6,marginTop:6}}>

          style={{marginTop:6,padding:'4px 10px',background:'transparent',border:'1px dashed '+c+'35',color:c,opacity:.6,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4,width:'100%'}}

          onMouseOut={function(e){e.currentTarget.style.opacity='.6';}}>+ Agregar</button>
      )}
    </div>
  );

function Login(props){
  const {onLogin,snd,onGetPCs}=props;
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [load,setLoad]=useState(false);
  function go(){
    var acc=ACCS.find(function(a){return a.username===user&&a.password===pass;});
    if(!acc){
      // Buscar en PCs dinamicas (usuarios NETGRID)
      var pcAcc=null;
      if(onGetPCs){
        var allpc=onGetPCs();
        var found=allpc.find(function(pc){return pc.netgridUser&&pc.netgridUser.trim()===user.trim()&&pc.netgridPass&&pc.netgridPass.trim()===pass.trim()&&(pc.netgridActivo===true||pc.netgridActivo==='true');});
        if(found){pcAcc={id:'pc_'+found.id,username:found.netgridUser,password:found.netgridPass,name:found.user||found.name,role:'USUARIO',dept:found.dept,avatar:(found.user||found.name||'U').slice(0,2).toUpperCase(),pcId:found.id};}
      }
      if(!pcAcc){setErr('CREDENCIALES INVALIDAS');snd.warn();return;}
      acc=pcAcc;
    }
    setLoad(true);setErr('');
    setTimeout(function(){snd.login();onLogin(acc);},800);
  }
  var inp={background:'#050f05',border:'1px solid #00ff2220',color:'#00ff22',fontFamily:'monospace',fontSize:12,padding:'11px 13px',width:'100%',borderRadius:4,outline:'none',letterSpacing:2};
  return (
    <div style={{position:'fixed',inset:0,background:'#020c04',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
      <MatrixRain opacity={.65}/>
      <div style={{position:'relative',zIndex:10,width:400}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:30,fontWeight:900,letterSpacing:8,color:'#00ff22',textShadow:'0 0 30px #00ff22'}}>NETGRID</div>
          <div style={{fontSize:8,letterSpacing:5,color:'#00ff22',opacity:.35,marginTop:4}}>NETWORK ADMIN v6.0</div>
        </div>
        <div style={{background:'rgba(3,14,5,.97)',border:'1px solid #00ff2220',borderRadius:12,padding:'32px 36px',backdropFilter:'blur(10px)'}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.35,marginBottom:6}}>USUARIO</div>
            <input value={user} onChange={function(e){setUser(e.target.value);}} style={inp} placeholder="usuario"
              onKeyDown={function(e){if(e.key==='Enter')go();}}
              onFocus={function(e){e.target.style.borderColor='#00ff22';}}
              onBlur={function(e){e.target.style.borderColor='#00ff2220';}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.35,marginBottom:6}}>CONTRASENA</div>
            <input type="password" value={pass} onChange={function(e){setPass(e.target.value);}} style={inp} placeholder="..."
              onKeyDown={function(e){if(e.key==='Enter')go();}}
              onFocus={function(e){e.target.style.borderColor='#00ff22';}}
              onBlur={function(e){e.target.style.borderColor='#00ff2220';}}/>
          </div>
          {err&&<div style={{fontSize:9,color:'#ff2222',letterSpacing:2,marginBottom:10,textAlign:'center'}}>{err}</div>}
          <button onClick={go} disabled={load} style={{width:'100%',padding:'12px',marginTop:12,background:'#0a1a0a',border:'1px solid #00ff22',color:'#00ff22',fontFamily:'monospace',fontSize:10,letterSpacing:4,cursor:load?'wait':'pointer',borderRadius:4,transition:'all .2s'}}
            onMouseOver={function(e){e.target.style.background='#0f2210';}}
            onMouseOut={function(e){e.target.style.background='#0a1a0a';}}>
            {load?'VERIFICANDO...':'INICIAR SESION'}
          </button>
          <div style={{marginTop:20,padding:'10px',background:'#020c04',border:'1px solid #00ff2210',borderRadius:5}}>
            <div style={{fontSize:7,letterSpacing:3,opacity:.25,marginBottom:7}}>CUENTAS DEMO</div>
            {ACCS.map(function(a){return (
              <div key={a.id} onClick={function(){setUser(a.username);setPass(a.password);snd.click();}}
                style={{display:'flex',justifyContent:'space-between',padding:'4px 7px',marginBottom:2,borderRadius:3,cursor:'pointer'}}
                onMouseOver={function(e){e.currentTarget.style.background='#00ff2208';}}
                onMouseOut={function(e){e.currentTarget.style.background='transparent';}}>
                <span style={{fontSize:8,color:'#00ff22',opacity:.55}}>{a.username}</span>
                <span style={{fontSize:8,color:RC[a.role],letterSpacing:2}}>{a.role}</span>
                <span style={{fontSize:8,color:'#00ff22',opacity:.25}}>{a.password}</span>
              </div>
            );})}
          </div>
        </div>
      </div>
    </div>
  );
}

              ENVIAR RESPUESTA

      </div>
    </div>
  );
}


function TicketsAdminView(props){
  var allTickets=props.allTickets;
  var onView=props.onView;
  var snd=props.snd;

  var _filt=useState('pendientes');
  var filtro=_filt[0]; var setFiltro=_filt[1];

  var _urg=useState('TODAS');
  var urgFiltro=_urg[0]; var setUrgFiltro=_urg[1];

  var _srch=useState('');
  var search=_srch[0]; var setSearch=_srch[1];

  var URGCOLORS={Baja:'#00aaff',Normal:'#00ff22',Alta:'#ffff00',Critica:'#ff2222'};
  var stColors={abierto:'#ff8800','en proceso':'#ffff00',resuelto:'#00ff22'};

  var filtered=allTickets.filter(function(t){
    if(filtro==='pendientes') return t.status!=='resuelto';
    if(filtro==='proceso') return t.status==='en proceso';
    if(filtro==='resueltos') return t.status==='resuelto';
    return true;
  }).filter(function(t){
    if(urgFiltro!=='TODAS') return t.urgencia===urgFiltro;
    return true;
  }).filter(function(t){
    if(!search) return true;
    var q=search.toLowerCase();
    return (t.titulo||'').toLowerCase().indexOf(q)>-1||(t.pcName||'').toLowerCase().indexOf(q)>-1||(t.pcUser||'').toLowerCase().indexOf(q)>-1;
  });

  var pendCount=allTickets.filter(function(t){return t.status==='abierto';}).length;
  var procCount=allTickets.filter(function(t){return t.status==='en proceso';}).length;
  var resCount=allTickets.filter(function(t){return t.status==='resuelto';}).length;

  var tabs=[
    {k:'pendientes',l:'ABIERTOS',n:pendCount,c:'#ff8800'},
    {k:'proceso',l:'EN PROCESO',n:procCount,c:'#ffff00'},
    {k:'resueltos',l:'RESUELTOS',n:resCount,c:'#00ff22'},
    {k:'todos',l:'TODOS',n:allTickets.length,c:'#00aaff'},
  ];
  var urgs=['TODAS','Critica','Alta','Normal','Baja'];

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',zIndex:5}}>
      <div style={{padding:'8px 18px',borderBottom:'1px solid #00ff2210',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap',background:'rgba(2,10,4,.6)'}}>
        <span style={{fontSize:7,letterSpacing:3,opacity:.3,flexShrink:0}}>TICKETS</span>
        <div style={{display:'flex',gap:5,flexShrink:0}}>
          {tabs.map(function(f){
            var active=filtro===f.k;
            return (
              <button key={f.k} onClick={function(){setFiltro(f.k);snd.click();}}
                style={{padding:'3px 10px',background:active?f.c+'18':'transparent',border:'1px solid '+(active?f.c:f.c+'20'),
                  color:active?f.c:f.c+'40',fontFamily:'monospace',fontSize:7,cursor:'pointer',borderRadius:3,letterSpacing:1}}>
                {f.l}{f.n>0?(' ('+f.n+')'):''}
              </button>
            );
          })}
        </div>
        <div style={{width:1,height:18,background:'#00ff2215',flexShrink:0}}/>
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          {urgs.map(function(u){
            var c=u==='TODAS'?'#00ff22':(URGCOLORS[u]||'#00ff22');
            var active=urgFiltro===u;
            return (
              <button key={u} onClick={function(){setUrgFiltro(u);snd.click();}}
                style={{padding:'3px 7px',background:active?c+'15':'transparent',border:'1px solid '+(active?c:c+'15'),
                  color:active?c:c+'35',fontFamily:'monospace',fontSize:6,cursor:'pointer',borderRadius:3}}>
                {u}
              </button>
            );
          })}
        </div>
        <div style={{marginLeft:'auto'}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="BUSCAR..."
            style={{background:'#0a160a',border:'1px solid #00ff2215',color:'#00ff22',fontFamily:'monospace',fontSize:9,padding:'4px 10px',borderRadius:4,outline:'none',width:150}}
            onFocus={function(e){e.target.style.borderColor='#00ff22';}}
            onBlur={function(e){e.target.style.borderColor='#00ff2215';}}/>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
        {filtered.length===0&&<div style={{textAlign:'center',padding:'80px',opacity:.2,fontSize:10,letterSpacing:3}}>
          {allTickets.length===0?'SIN TICKETS AUN':'SIN RESULTADOS'}
        </div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
          {filtered.map(function(t,i){
            var uc=URGCOLORS[t.urgencia]||'#00ff22';
            var sc2=stColors[t.status]||'#ff8800';
            var hasResp=t.respuestas&&t.respuestas.length>0;
            return (
              <div key={t.id||i} onClick={function(){onView(t);snd.click();}}
                style={{background:'#030e05',border:'1px solid '+uc+'22',borderLeft:'3px solid '+uc,
                  borderRadius:6,padding:'12px',cursor:'pointer',transition:'border .12s'}}
                onMouseOver={function(e){e.currentTarget.style.background='#061408';}}
                onMouseOut={function(e){e.currentTarget.style.background='#030e05';}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:6,padding:'2px 6px',borderRadius:3,background:uc+'15',border:'1px solid '+uc+'35',color:uc,fontWeight:700}}>{(t.urgencia||'Normal').toUpperCase()}</span>
                    <span style={{fontSize:6,padding:'2px 6px',borderRadius:3,background:sc2+'15',border:'1px solid '+sc2+'35',color:sc2,textTransform:'uppercase'}}>{t.status||'abierto'}</span>
                    {hasResp&&<span style={{fontSize:6,padding:'2px 6px',borderRadius:3,background:'#00aaff15',border:'1px solid #00aaff30',color:'#00aaff'}}>{'RESP '+t.respuestas.length}</span>}
                  </div>
                  <span style={{fontSize:6,opacity:.25,flexShrink:0,marginLeft:6}}>{(t.creadoAt||'').slice(8,16)}</span>
                </div>
                <div style={{fontSize:11,color:'#00ff22',fontWeight:700,marginBottom:5,lineHeight:1.3}}>{t.titulo}</div>
                {t.descripcion&&<div style={{fontSize:8,opacity:.35,lineHeight:1.4,marginBottom:8,maxHeight:32,overflow:'hidden'}}>{t.descripcion}</div>}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:7,borderTop:'1px solid #00ff2208'}}>
                  <div>
                    <div style={{fontSize:8,color:'#00aaff'}}>{t.pcName||'--'}</div>
                    <div style={{fontSize:7,opacity:.3}}>{t.pcUser||''}</div>
                  </div>
                  <div style={{fontSize:7,color:uc,opacity:.6}}>{t.tipo||''}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


function App(){
  const [cu,setCu]=useState(null);
  const [rows,setRows]=useState(function(){
    try{
      var saved=localStorage.getItem('netgrid_rows');
      if(saved){var parsed=JSON.parse(saved);if(parsed&&parsed.length)return parsed;}
    }catch(e){}
    return [];
  });
  const [editPC,setEditPC]=useState(null);
  const [histPC,setHistPC]=useState(null);
  const [bajaPC,setBajaPC]=useState(null);
  const [deleted,setDeleted]=useState(function(){
    try{var s=localStorage.getItem('netgrid_deleted');if(s)return JSON.parse(s);}catch(e){}
    return [];
  });
  const [delConfirm,setDelConfirm]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [drag,setDrag]=useState(null);
  const [toast,setToast]=useState(null);
  const [logs,setLogs]=useState(function(){
    try{var s=localStorage.getItem('netgrid_logs');if(s){var p=JSON.parse(s);if(p&&p.length)return p;}}catch(e){}
    return [{t:nowT(),msg:'Sistema iniciado',type:'ok'}];
  });
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('ALL');
  const [sfilt,setSfilt]=useState('ALL');
  const [panel,setPanel]=useState(function(){var saved=null;try{saved=localStorage.getItem('netgrid_panel');}catch(e){}return saved||'LOGS';});
  const [viewTicket,setViewTicket]=useState(null);
  const [adminView,setAdminView]=useState('grid'); // 'grid' | 'tickets'
  const [pinging,setPinging]=useState(false);
  const [selIds,setSelIds]=useState(new Set());
  const [time,setTime]=useState(nowT());
  const toastRef=useRef(null);
  const snd=useSound();

  useEffect(function(){
    var t=setInterval(function(){setTime(nowT());},1000);
    return function(){clearInterval(t);};
  },[]);
  // Firebase sync
  useEffect(function(){
    try{
      if(!window.db) return;
      var fbRef = window.db.ref('netgrid');
      fbRef.once('value', function(snap){
        try{
          var data = snap.val();
          if(data){
            if(data.rows && data.rows.length) setRows(data.rows);
            if(data.deleted && data.deleted.length) setDeleted(data.deleted);
            if(data.logs && data.logs.length) setLogs(data.logs);
          }
        }catch(e){}
      });
      var handler = fbRef.on('value', function(snap){
        try{
          var data = snap.val();
          if(!data || !data.rows) return;
          setRows(function(prev){
            if(JSON.stringify(prev)===JSON.stringify(data.rows)) return prev;
            return data.rows;
          });
        }catch(e){}
      });
      return function(){ try{ fbRef.off('value', handler); }catch(e){} };
    }catch(e){}
  },[]);

  useEffect(function(){
    try{ if(window.db) window.db.ref('netgrid/rows').set(rows); }catch(e){}
  },[rows]);

  useEffect(function(){
    try{ if(window.db) window.db.ref('netgrid/deleted').set(deleted); }catch(e){}
  },[deleted]);

  useEffect(function(){
    try{ if(window.db) window.db.ref('netgrid/logs').set(logs.slice(-100)); }catch(e){}
  },[logs]);



  useEffect(function(){
    try{localStorage.setItem('netgrid_rows',JSON.stringify(rows));}catch(e){}
  },[rows]);

  useEffect(function(){
    try{localStorage.setItem('netgrid_deleted',JSON.stringify(deleted));}catch(e){}
  },[deleted]);

  useEffect(function(){
    try{localStorage.setItem('netgrid_logs',JSON.stringify(logs.slice(-100)));}catch(e){}
  },[logs]);

  useEffect(function(){
    var idx=0;
    var t=setInterval(function(){
      setRows(function(prev){
        if(!prev.length)return prev;
        var ri=idx%prev.length;idx++;
        var next=prev.slice();
        next[ri]=Object.assign({},next[ri],{pcs:next[ri].pcs.map(function(pc){
          if(pc.status!=='ACTIVO')return pc;
          return Object.assign({},pc,{ping:rndPing(),cpu:Math.min(100,Math.max(1,(pc.cpu+(Math.random()*8-4))|0)),ram:Math.min(100,Math.max(1,(pc.ram+(Math.random()*5-2))|0))});
        })});
        return next;
      });
    },800);
    return function(){clearInterval(t);};
  },[]);

  function addLog(msg,type){
    setLogs(function(p){return [{t:nowT(),msg:msg,type:type||'ok'},...p.slice(0,79)];});
  }
  function showToast(msg,type){
    if(toastRef.current)clearTimeout(toastRef.current);
    setToast({msg:msg,type:type||'ok'});
    toastRef.current=setTimeout(function(){setToast(null);},2500);
  }

  var allPCs=useMemo(function(){return rows.flatMap(function(r){return r.pcs;});},[ rows]);
  var allTickets=useMemo(function(){return allPCs.reduce(function(a,pc){return a.concat((pc.tickets||[]).map(function(t){return Object.assign({},t,{pcName:pc.name,pcId:pc.id,pcUser:pc.user||'--'});}));},[])
    .sort(function(a,b){return (b.creadoAt||'')>(a.creadoAt||'')?1:-1;});},[allPCs]);
  var activePCs=useMemo(function(){return allPCs.filter(function(p){return p.status!=='ELIMINADO';});},[ allPCs]);
  var stats=useMemo(function(){
    var act=activePCs.filter(function(p){return p.status==='ACTIVO';});
    var wp=activePCs.filter(function(p){return p.ping;});
    return {
      total:activePCs.length,active:act.length,
      maint:activePCs.filter(function(p){return p.status==='MANTENIMIENTO';}).length,
      baja:activePCs.filter(function(p){return p.status==='BAJA';}).length,
      elim:allPCs.filter(function(p){return p.status==='ELIMINADO';}).length,
      alerts:activePCs.filter(function(p){return p.alerts&&p.alerts.length>0;}).length,
      bl_si:activePCs.filter(function(p){return blNum(p.bitlocker)===1;}).length,
      bl_no:activePCs.filter(function(p){return blNum(p.bitlocker)===0;}).length,
      avgPing:wp.length?Math.round(wp.reduce(function(a,p){return a+p.ping;},0)/wp.length):0,
      avgCPU:act.length?Math.round(act.reduce(function(a,p){return a+p.cpu;},0)/act.length):0,
      avgRAM:act.length?Math.round(act.reduce(function(a,p){return a+p.ram;},0)/act.length):0,
    };
  },[allPCs,activePCs]);
  var pct=Math.round(stats.active/Math.max(stats.total,1)*100);
  var perms=cu?PERMS[cu.role]:{};

  var filtRows=useMemo(function(){
    if(filter==='ELIM'){
      // Vista de eliminados: mostrar solo PCs/filas eliminadas
      return rows.map(function(row){
        var elimPCs=row.pcs.filter(function(pc){return pc.status==='ELIMINADO';});
        if(search){var s=search.toLowerCase();elimPCs=elimPCs.filter(function(pc){return pc.name.toLowerCase().includes(s)||pc.ip.includes(s)||(pc.user||'').toLowerCase().includes(s);});}
        return Object.assign({},row,{pcs:elimPCs});
      }).filter(function(r){return r.pcs.length>0||r.eliminada;});
    }
    // Vista normal: nunca mostrar eliminados
    return rows.map(function(row){
      return Object.assign({},row,{pcs:row.pcs.filter(function(pc){
        if(pc.status==='ELIMINADO')return false;
        if(filter==='ONLINE'&&pc.status!=='ACTIVO')return false;
        if(filter==='OFFLINE'&&pc.status==='ACTIVO')return false;
        if(filter==='ALERT'&&!(pc.alerts&&pc.alerts.length))return false;
        if(sfilt==='BL1'&&blNum(pc.bitlocker)!==1)return false;
        if(sfilt==='BL0'&&blNum(pc.bitlocker)!==0)return false;
        if(sfilt==='BL2'&&blNum(pc.bitlocker)!==2)return false;
        if(sfilt!=='ALL'&&sfilt!=='BL0'&&sfilt!=='BL1'&&sfilt!=='BL2'&&pc.status!==sfilt)return false;
        if(search){var s=search.toLowerCase();if(!pc.name.toLowerCase().includes(s)&&!pc.ip.includes(s)&&!(pc.user||'').toLowerCase().includes(s)&&!(pc.mac||'').toLowerCase().includes(s))return false;}
        return true;
      })});
    }).filter(function(r){return r.pcs.length>0;});
  },[rows,search,filter,sfilt]);

  function handleLogin(acc){
    if(acc.role==='USUARIO'){
      var pcFound=rows.flatMap(function(r){return r.pcs;}).find(function(pc){return pc.netgridUser===acc.username&&pc.netgridActivo;});
      setCu(Object.assign({},acc,{pcVinculada:pcFound?pcFound.id:null}));
    } else {
      setCu(acc);
    }
    addLog(acc.name+' inicio sesion ['+acc.role+']','ok');showToast('Bienvenido, '+acc.name);
  }
  function handleLogout(){addLog(cu.name+' cerro sesion','warn');snd.logout();setCu(null);}

  function handleSave(upd){
    var old=allPCs.find(function(p){return p.id===upd.id;});
    var changes=[];
    if(old.name!==upd.name)changes.push({field:'Nombre',from:old.name,to:upd.name});
    if(old.ip!==upd.ip)changes.push({field:'IP',from:old.ip,to:upd.ip});
    if((old.mac||'')!==(upd.mac||''))changes.push({field:'MAC',from:old.mac||'--',to:upd.mac||'--'});
    if(blNum(old.bitlocker)!==blNum(upd.bitlocker))changes.push({field:'BitLocker',from:BLLABEL[blNum(old.bitlocker)],to:BLLABEL[blNum(upd.bitlocker)]});
    if(old.status!==upd.status)changes.push({field:'Estado',from:old.status,to:upd.status});
    if(old.email!==upd.email)changes.push({field:'Correo',from:old.email||'--',to:upd.email||'--'});
    if(old.office365!==upd.office365)changes.push({field:'Office365',from:String(old.office365),to:String(upd.office365)});
    var entry=changes.length>0?{action:'EDITADO',changes:changes,user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}:null;
    var final=entry?Object.assign({},upd,{history:[...upd.history,entry]}):upd;
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return pc.id===upd.id?final:pc;})});});});
    setEditPC(null);
    if(entry)addLog(cu.name+' edito '+upd.name,'ok');
    showToast(upd.name+' guardado');
  }

  function handleDelete(id){
    var pc=allPCs.find(function(p){return p.id===id;});
    setDelConfirm({type:'pc',item:pc,onConfirm:function(reason,notes){
      setDeleted(function(p){return [{id:uid(),tipo:'PC',nombre:pc.name,ip:pc.ip,dept:pc.dept,os:pc.os,motivo:reason,notas:notes,eliminadoPor:cu.name,rol:cu.role,at:nowDT()},...p];});
      setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(p2){
        if(p2.id!==id)return p2;
        return Object.assign({},p2,{status:'ELIMINADO',ping:null,eliminadoPor:cu.name,eliminadoAt:nowDT(),eliminadoMotivo:reason,eliminadoNotas:notes});
      })});});});
      setEditPC(null);setDelConfirm(null);
      addLog(cu.name+' ELIMINO '+pc.name+' ['+reason+']','warn');showToast('Eliminado','warn');snd.del();
    }});
  }

  function handleBaja(reason){
    var pc=bajaPC;
    var entry={action:'DADO DE BAJA: '+reason,changes:[{field:'Estado',from:pc.status,to:'BAJA'},{field:'Motivo',from:'--',to:reason}],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()};
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(p2){return p2.id===pc.id?Object.assign({},p2,{status:'BAJA',ping:null,bajaReason:reason,history:[...p2.history,entry]}):p2;})});});});
    setDeleted(function(p){return [{id:uid(),tipo:'BAJA',nombre:pc.name,ip:pc.ip,dept:pc.dept,os:pc.os,motivo:reason,notas:'',eliminadoPor:cu.name,rol:cu.role,at:nowDT()},...p];});
    setBajaPC(null);setEditPC(null);
    addLog(cu.name+' BAJA '+pc.name+': '+reason,'warn');showToast(pc.name+' baja','warn');snd.warn();
  }

  function handleRespond(pcId, ticketId, mensaje, newStatus){
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){
      if(pc.id!==pcId)return pc;
      var newTickets=(pc.tickets||[]).map(function(t){
        if(t.id!==ticketId)return t;
        return Object.assign({},t,{status:newStatus,respuestas:[...(t.respuestas||[]),{tecnico:cu.name,mensaje:mensaje,at:nowDT()}]});
      });
      return Object.assign({},pc,{tickets:newTickets});
    })});});});
    addLog(cu.name+' respondio ticket','ok');
    snd.ok();
  }
  function handleAddRows(qty,perRow){
    setRows(function(prev){
      var start=prev.length;
      var newRows=Array.from({length:qty},function(_,ri){
        return {id:uid(),label:'Fila '+(start+ri+1),pcs:Array.from({length:perRow},function(_,c){
          return Object.assign(mkPC(start+ri,c),{addedBy:cu.username,addedAt:new Date().toISOString(),history:[{action:'CREADO',changes:[],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}]});
        })};
      });
      return [...prev,...newRows];
    });
    setShowAdd(false);
    addLog(cu.name+' creo '+qty+' fila(s) x '+perRow+' = '+(qty*perRow)+' PCs','ok');
    showToast((qty*perRow)+' equipos creados');snd.ok();
  }

  function handleAddPC(rowId){
    setRows(function(prev){
      var ri=prev.findIndex(function(r){return r.id===rowId;}),ci=prev[ri].pcs.length;
      var npc=Object.assign(mkPC(ri,ci),{id:uid(),name:'PC-'+String(ri+1).padStart(2,'0')+String(ci+1).padStart(2,'0'),ip:'192.168.'+String(ri+1)+'.'+String(ci+1),addedBy:cu.username,addedAt:new Date().toISOString(),history:[{action:'AGREGADO',changes:[],user:cu.name,role:cu.role,avatar:cu.avatar,at:nowDT()}]});
      return prev.map(function(r,i){return i===ri?Object.assign({},r,{pcs:[...r.pcs,npc]}):r;});
    });
    addLog(cu.name+' agrego PC','ok');showToast('PC agregado');snd.ok();
  }

  function handleDelRow(rowId){
    var row=rows.find(function(r){return r.id===rowId;});
    setDelConfirm({type:'fila',item:row,onConfirm:function(reason,notes){
      setDeleted(function(p){return [{id:uid(),tipo:'FILA',nombre:row.label,ip:'--',dept:'--',os:row.pcs.length+' PCs',motivo:reason,notas:notes,eliminadoPor:cu.name,rol:cu.role,at:nowDT()},...p];});
      setRows(function(p){return p.map(function(r){
        if(r.id!==rowId)return r;
        return Object.assign({},r,{eliminada:true,eliminadaPor:cu.name,eliminadaAt:nowDT(),eliminadaMotivo:reason,eliminadaNotas:notes,
          pcs:r.pcs.map(function(pc){return Object.assign({},pc,{status:'ELIMINADO',ping:null,eliminadoPor:cu.name,eliminadoAt:nowDT(),eliminadoMotivo:reason,eliminadoNotas:notes});})
        });
      });});
      setDelConfirm(null);
      addLog(cu.name+' elimino '+(row?row.label:rowId)+' ['+reason+']','warn');showToast('Fila eliminada','warn');snd.del();
    }});
  }

  function handleRenameRow(rowId, newLabel){
    setRows(function(p){return p.map(function(r){return r.id===rowId?Object.assign({},r,{label:newLabel}):r;});});
    addLog(cu.name+' renombro fila a: '+newLabel,'ok');
  }
  function handleRowPwr(rIdx,status){
    setRows(function(p){return p.map(function(r,i){return i===rIdx?Object.assign({},r,{pcs:r.pcs.map(function(pc){return Object.assign({},pc,{status:status,ping:status==='ACTIVO'?rndPing():null});})}):r;});});
    addLog(cu.name+': Fila '+(rIdx+1)+' -> '+status,'ok');snd.click();
  }

  function handlePingAll(){
    setPinging(true);addLog(cu.name+' ping masivo','ok');snd.ping();
    setTimeout(function(){
      setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){return pc.status==='ACTIVO'?Object.assign({},pc,{ping:rndPing()}):pc;})});});});
      addLog('Ping OK: '+stats.active+'/'+stats.total,'ok');showToast('Ping completado');snd.ok();setPinging(false);
    },1400);
  }

  function handleDragStart(e,pc){setDrag(pc);e.dataTransfer.effectAllowed='move';}
  function handleDrop(e,target){
    e.preventDefault();if(!drag||drag.id===target.id)return;
    setRows(function(p){return p.map(function(row){return Object.assign({},row,{pcs:row.pcs.map(function(pc){
      if(pc.id===drag.id)return Object.assign({},pc,{name:target.name,ip:target.ip,status:target.status,user:target.user,ping:target.ping,cpu:target.cpu,ram:target.ram});
      if(pc.id===target.id)return Object.assign({},pc,{name:drag.name,ip:drag.ip,status:drag.status,user:drag.user,ping:drag.ping,cpu:drag.cpu,ram:drag.ram});
      return pc;
    })});});});
    addLog(cu.name+' movio '+drag.name+' - '+target.name,'ok');snd.move();setDrag(null);
  }

            return Object.assign({},p,{tickets:tks,alerts:hasOpen?['Ticket pendiente']:[]});
          })});
        });
      });
      addLog(cu.name+' reporto: '+ticket.titulo+' ['+ticket.urgencia+']','warn');
      showToast('Ticket enviado a TI');
      snd.ok();

                </div>
                <div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',width:item.b+'%',background:item.c,borderRadius:2,transition:'width .8s'}}/>
                </div>
              </div>
            );})}
            <div style={{marginTop:14,padding:'10px',background:'#020c04',border:'1px solid #00ff2210',borderRadius:5}}>
              <div style={{fontSize:6,opacity:.25,marginBottom:9}}>POR ESTADO</div>
              {STLIST.map(function(st){var cnt=allPCs.filter(function(p){return p.status===st;}).length;var b2=Math.round(cnt/Math.max(allPCs.length,1)*100);return (
                <div key={st} style={{marginBottom:7}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:7,color:SC[st]}}>{st}</span>
                    <span style={{fontSize:8,color:SC[st],fontWeight:700}}>{cnt}</span>
                  </div>
                  <div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:b2+'%',background:SC[st],transition:'width .5s'}}/>
                  </div>
                </div>
              );})}
            </div>
          </div>}
          {panel==='MAPA'&&<div style={{flex:1,overflowY:'auto',padding:'12px'}}>
            <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>MAPA DE RED</div>
            <div style={{fontSize:7,opacity:.2,marginBottom:10}}>{stats.total+' EQ - '+rows.length+' FILAS'}</div>
            {rows.map(function(row){return (
              <div key={row.id} style={{marginBottom:10}}>
                <div style={{fontSize:6,opacity:.25,marginBottom:4}}>{row.label.toUpperCase()+' ('+row.pcs.length+')'}</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
                  {row.pcs.map(function(pc){return (
                    <div key={pc.id} title={pc.name+' '+pc.ip+' '+pc.status}
                      onClick={function(){setEditPC(pc);snd.click();}}
                      style={{width:12,height:12,borderRadius:1,cursor:'pointer',background:SC[pc.status],boxShadow:pc.status==='ACTIVO'?'0 0 3px #00ff22':'none',opacity:pc.status==='ACTIVO'?1:.45,transition:'all .3s'}}/>
                  );})}
                </div>
              </div>
            );})}
            <div style={{marginTop:10,padding:'8px',background:'#030e05',border:'1px solid #00ff2210',borderRadius:4}}>
              {STLIST.map(function(st){return (
                <div key={st} style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                  <div style={{width:9,height:9,borderRadius:1,background:SC[st]}}/>
                  <span style={{fontSize:7,color:SC[st],opacity:.65}}>{st+' ('+allPCs.filter(function(p){return p.status===st;}).length+')'}</span>
                </div>
              );})}
            </div>
          </div>}
          {panel==='TICKETS'&&<div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
            <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:9}}>TICKETS PENDIENTES</div>
            {allTickets.filter(function(t){return t.status!=='resuelto';}).length===0&&<div style={{textAlign:'center',padding:'30px 10px',opacity:.35,fontSize:8,letterSpacing:1,lineHeight:1.8}}>SIN TICKETS<br/>Los usuarios envian<br/>solicitudes desde<br/>su portal</div>}
            {allTickets.filter(function(t){return t.status!=='resuelto';}).map(function(t,i){
              var URGCOLORS={Baja:'#00aaff',Normal:'#00ff22',Alta:'#ffff00',Critica:'#ff2222'};
              var uc=URGCOLORS[t.urgencia]||'#00ff22';
              var stc=t.status==='en proceso'?'#ffff00':'#ff8800';
              return (
                <div key={t.id||i} onClick={function(){setViewTicket(t);snd.click();}}
                  style={{marginBottom:8,padding:'8px 10px',background:'#060e06',border:'1px solid '+uc+'20',borderRadius:5,cursor:'pointer',transition:'all .15s',animation:i===0?'fadein .25s ease':'none'}}
                  onMouseOver={function(e){e.currentTarget.style.borderColor=uc+'50';e.currentTarget.style.background='#0a1a0a';}}
                  onMouseOut={function(e){e.currentTarget.style.borderColor=uc+'20';e.currentTarget.style.background='#060e06';}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:6,padding:'1px 5px',borderRadius:2,background:uc+'15',border:'1px solid '+uc+'30',color:uc}}>{t.urgencia||'Normal'}</span>
                    <span style={{fontSize:6,color:stc}}>{t.status||'abierto'}</span>
                  </div>
                  <div style={{fontSize:9,color:'#00ff22',fontWeight:700,marginBottom:2,lineHeight:1.3}}>{t.titulo}</div>
                  <div style={{fontSize:7,color:'#00aaff',opacity:.7}}>{t.pcName}</div>
                  <div style={{fontSize:6,opacity:.3,marginTop:2}}>{(t.creadoAt||'').slice(0,16)}</div>
                </div>
              );
            })}
            {allTickets.filter(function(t){return t.status==='resuelto';}).length>0&&<div>
              <div style={{fontSize:6,letterSpacing:3,opacity:.2,margin:'10px 0 7px'}}>RESUELTOS</div>
              {allTickets.filter(function(t){return t.status==='resuelto';}).slice(0,5).map(function(t,i){return (
                <div key={t.id||i} onClick={function(){setViewTicket(t);snd.click();}}
                  style={{marginBottom:6,padding:'6px 10px',background:'#020c04',border:'1px solid #00ff2210',borderRadius:4,cursor:'pointer',opacity:.5}}>
                  <div style={{fontSize:8,color:'#00ff22'}}>{t.titulo}</div>
                  <div style={{fontSize:6,color:'#00aaff',opacity:.7}}>{t.pcName}</div>
                </div>
              );})}
            </div>}
          </div>}
          {panel==='BAJAS'&&<div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
              <div style={{fontSize:6,letterSpacing:3,opacity:.25}}>REGISTRO DE ELIMINADOS</div>
              {deleted.length>0&&<button onClick={function(){if(window.confirm('Limpiar historial?')){setDeleted([]);}}}
                style={{fontSize:6,color:'#ff222240',background:'transparent',border:'1px solid #ff222220',borderRadius:3,padding:'1px 6px',cursor:'pointer',fontFamily:'inherit'}}>LIMPIAR</button>}
            </div>
            {deleted.length===0&&<div style={{textAlign:'center',padding:'40px 10px',opacity:.2,fontSize:9,letterSpacing:2}}>SIN ELIMINACIONES</div>}
            {deleted.map(function(d,i){return (
              <div key={d.id} style={{marginBottom:8,padding:'8px 10px',background:'#0d0000',border:'1px solid #ff222220',borderRadius:5,animation:i===0?'fadein .25s ease':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:8,fontWeight:700,letterSpacing:1,padding:'1px 6px',borderRadius:3,
                    background:d.tipo==='BAJA'?'#ff880018':d.tipo==='PC'?'#ff222218':'#aa000018',
                    border:'1px solid '+(d.tipo==='BAJA'?'#ff880040':d.tipo==='PC'?'#ff222240':'#aa000040'),
                    color:d.tipo==='BAJA'?'#ff8800':d.tipo==='PC'?'#ff2222':'#ff5555'}}>
                    {d.tipo==='BAJA'?'BAJA':d.tipo==='PC'?'PC ELIMINADA':'FILA ELIMINADA'}
                  </span>
                  <span style={{fontSize:6,color:'#ff222250'}}>{d.at}</span>
                </div>
                <div style={{fontSize:9,color:'#ff8800',marginBottom:2,wordBreak:'break-all'}}>{d.nombre}</div>
                {d.ip!=='--'&&<div style={{fontSize:7,color:'#ff222260',marginBottom:2}}>{d.ip}</div>}
                <div style={{fontSize:7,color:'#ff222260',marginBottom:4}}>{d.os}{d.dept!=='--'?' | '+d.dept:''}</div>
                <div style={{padding:'4px 7px',background:'#1a0000',border:'1px solid #ff222215',borderRadius:3,marginBottom:3}}>
                  <div style={{fontSize:6,opacity:.4,marginBottom:1}}>MOTIVO</div>
                  <div style={{fontSize:8,color:'#ff2222'}}>{d.motivo}</div>
                  {d.notas&&<div style={{fontSize:7,color:'#ff8800',opacity:.7,marginTop:2}}>{d.notas}</div>}
                </div>
                <div style={{fontSize:6,color:'#ff222245'}}>{d.eliminadoPor} <span style={{color:'#ff222230'}}>[{d.rol}]</span></div>
              </div>
            );})}
          </div>}
        </div>
      </div>}
      <div style={{position:'relative',zIndex:10,borderTop:'1px solid #00ff2210',background:'rgba(2,10,4,.97)',padding:'4px 18px',display:'flex',gap:16,alignItems:'center',fontSize:7,letterSpacing:2,color:'#00ff22',opacity:.4}}>
        <span style={{animation:'pulse 1.5s infinite'}}>o</span>
        <span>ACTIVO</span>
        <span>{'ROL: '}<span style={{color:RC[cu.role]}}>{cu.role}</span></span>
        <span>{'FILAS: '+rows.length}</span>
        <span>{'TOTAL: '+stats.total}</span>
        <span>{'ON: '+stats.active}</span>
        <span>{'BAJA: '}<span style={{color:'#ff2222'}}>{stats.baja}</span></span>
        <div style={{flex:1}}/>
        {!perms.edit&&<span style={{color:'#ffff00'}}>SOLO LECTURA</span>}
        <span style={{animation:'blink 1s infinite'}}>_</span>
      </div>

      {toast&&<div style={{position:'fixed',bottom:26,right:26,zIndex:5000,background:'rgba(3,14,5,.97)',border:'1px solid '+(toast.type==='warn'?'#ff2222':'#00ff22'),color:toast.type==='warn'?'#ff2222':'#00ff22',padding:'9px 20px',borderRadius:4,fontFamily:'inherit',fontSize:9,letterSpacing:2,animation:'fadein .2s ease'}}>
        {toast.type==='warn'?'! ':''}{toast.msg.toUpperCase()}
      </div>}

      {editPC&&!bajaPC&&<PCModal pc={editPC} onClose={function(){setEditPC(null);}} onSave={handleSave} onDelete={handleDelete} onBaja={function(pc){setBajaPC(pc);}} onHist={setHistPC} cu={cu} snd={snd}/>}
      {delConfirm&&<DelConfirmModal item={delConfirm.item} type={delConfirm.type} onClose={function(){setDelConfirm(null);}} onConfirm={delConfirm.onConfirm}/>}
      {bajaPC&&<BajaModal pc={bajaPC} onClose={function(){setBajaPC(null);}} onConfirm={handleBaja}/>}
      {histPC&&<HistModal pc={histPC} onClose={function(){setHistPC(null);}}/>}
      {showAdd&&<AddModal onClose={function(){setShowAdd(false);}} onAdd={handleAddRows}/>}
      {viewTicket&&<TicketViewerModal ticket={viewTicket} onClose={function(){setViewTicket(null);}} onRespond={handleRespond} cu={cu}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
}
__init();
</script>
</body>
</html>

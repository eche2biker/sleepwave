<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SleepWave" />
  <title>SleepWave – Ruido Blanco</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050a14;
      --deep: #020609;
      --mid: #0d1b2e;
      --accent: #4a9eff;
      --accent2: #7b5ea7;
      --glow: #1e4a8a;
      --text: #c8ddf5;
      --muted: #4a6a8a;
      --card: rgba(13, 27, 46, 0.7);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Stars background */
    .stars {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50% { opacity: var(--op); transform: scale(1); }
    }

    /* Moon */
    .moon {
      position: fixed;
      top: 40px; right: 40px;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e8f4ff, #b8d4f0 60%, #8ab0d8);
      box-shadow: 0 0 40px rgba(180,210,255,0.3), 0 0 80px rgba(100,160,255,0.15);
      animation: moonFloat 8s ease-in-out infinite;
    }
    .moon::after {
      content: '';
      position: absolute;
      top: 12px; left: 18px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(100,140,180,0.3);
      box-shadow: 20px 8px 0 rgba(100,140,180,0.2), 8px 28px 0 rgba(100,140,180,0.15);
    }
    @keyframes moonFloat {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }

    /* Waves viz */
    .wave-container {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      pointer-events: none;
      overflow: hidden;
    }
    .wave {
      position: absolute;
      bottom: 0; left: -100%;
      width: 300%;
      height: 160px;
      border-radius: 50% 50% 0 0 / 30% 30% 0 0;
      opacity: 0.06;
      animation: waveMove linear infinite;
      transition: opacity 1s ease;
    }
    .wave-1 { background: var(--accent); animation-duration: 12s; height: 120px; opacity: 0.07; }
    .wave-2 { background: var(--accent2); animation-duration: 17s; animation-direction: reverse; height: 100px; opacity: 0.05; }
    .wave-3 { background: var(--accent); animation-duration: 22s; height: 80px; opacity: 0.04; }
    .wave.active { opacity: 0.18; }
    .wave-2.active { opacity: 0.12; }
    .wave-3.active { opacity: 0.09; }
    @keyframes waveMove {
      from { transform: translateX(0); }
      to { transform: translateX(33.33%); }
    }

    /* Layout */
    .app {
      position: relative;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      padding-top: max(env(safe-area-inset-top), 20px);
      z-index: 10;
    }

    header {
      text-align: center;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: #d4eaff;
      text-transform: uppercase;
    }
    header p {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Central orb */
    .orb-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    .orb-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(74,158,255,0.15);
      animation: orbRing 4s ease-in-out infinite;
    }
    .orb-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
    .orb-ring:nth-child(2) { width: 240px; height: 240px; animation-delay: 0.5s; border-color: rgba(123,94,167,0.1); }
    .orb-ring:nth-child(3) { width: 280px; height: 280px; animation-delay: 1s; border-color: rgba(74,158,255,0.07); }
    @keyframes orbRing {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }

    .orb {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #1e4a8a, #0d1b2e 60%, #050a14);
      box-shadow: 0 0 60px rgba(74,158,255,0.2), inset 0 0 40px rgba(74,158,255,0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, box-shadow 0.5s ease;
      position: relative;
      z-index: 5;
    }
    .orb:active { transform: scale(0.95); }
    .orb.playing {
      box-shadow: 0 0 80px rgba(74,158,255,0.5), 0 0 120px rgba(74,158,255,0.2), inset 0 0 40px rgba(74,158,255,0.2);
      animation: orbPulse 3s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    .orb-icon {
      font-size: 2.8rem;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 0 10px rgba(74,158,255,0.5));
    }
    .orb.playing .orb-icon { animation: iconSpin 20s linear infinite; }
    @keyframes iconSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Sound name */
    .sound-name {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #a0c4e8;
      text-align: center;
    }

    /* Sound selector */
    .sounds-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 10px;
      max-width: 420px;
    }
    .sound-btn {
      background: var(--card);
      border: 1px solid rgba(74,158,255,0.15);
      border-radius: 50px;
      padding: 8px 18px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .sound-btn:hover { border-color: rgba(74,158,255,0.4); color: var(--text); }
    .sound-btn.active {
      background: rgba(74,158,255,0.15);
      border-color: rgba(74,158,255,0.6);
      color: #a0d4ff;
      box-shadow: 0 0 15px rgba(74,158,255,0.2);
    }

    /* Volume */
    .controls {
      width: 100%;
      max-width: 320px;
      padding: 16px 0 8px;
    }
    .vol-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }
    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .vol-icon { font-size: 1rem; opacity: 0.5; }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 10px;
      background: linear-gradient(to right, var(--accent) var(--val, 70%), var(--mid) var(--val, 70%));
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #7bc4ff, #4a9eff);
      box-shadow: 0 0 10px rgba(74,158,255,0.5);
      cursor: pointer;
    }

    /* Timer */
    .timer-section {
      padding-bottom: 8px;
    }
    .timer-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .timer-btn {
      background: transparent;
      border: 1px solid rgba(74,158,255,0.15);
      border-radius: 50px;
      padding: 6px 14px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .timer-btn.active {
      background: rgba(123,94,167,0.2);
      border-color: rgba(123,94,167,0.6);
      color: #c8a8f0;
    }
    .timer-display {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(123,94,167,0.8);
      margin-top: 8px;
      min-height: 16px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="wave-container">
  <div class="wave wave-1" id="w1"></div>
  <div class="wave wave-2" id="w2"></div>
  <div class="wave wave-3" id="w3"></div>
</div>

<div class="app">
  <header>
    <h1>SleepWave</h1>
    <p>Ruido para dormir · Offline</p>
  </header>

  <div class="orb-section">
    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb" id="mainOrb" onclick="togglePlay()">
        <span class="orb-icon" id="orbIcon">🌙</span>
      </div>
    </div>
    <div class="sound-name" id="soundName">Toca para reproducir</div>
  </div>

  <div class="sounds-grid">
    <button class="sound-btn active" data-sound="white" onclick="selectSound(this,'white')">Blanco</button>
    <button class="sound-btn" data-sound="pink" onclick="selectSound(this,'pink')">Rosa</button>
    <button class="sound-btn" data-sound="brown" onclick="selectSound(this,'brown')">Marrón</button>
    <button class="sound-btn" data-sound="rain" onclick="selectSound(this,'rain')">Lluvia</button>
    <button class="sound-btn" data-sound="ocean" onclick="selectSound(this,'ocean')">Océano</button>
    <button class="sound-btn" data-sound="fan" onclick="selectSound(this,'fan')">Ventilador</button>
  </div>

  <div class="controls">
    <div class="vol-label">Volumen</div>
    <div class="vol-wrap">
      <span class="vol-icon">🔈</span>
      <input type="range" min="0" max="100" value="70" id="volSlider" oninput="setVolume(this.value)" />
      <span class="vol-icon">🔊</span>
    </div>
  </div>

  <div class="timer-section">
    <div class="timer-btns">
      <button class="timer-btn" onclick="setTimer(this, 15)">15 min</button>
      <button class="timer-btn" onclick="setTimer(this, 30)">30 min</button>
      <button class="timer-btn" onclick="setTimer(this, 60)">1 hora</button>
      <button class="timer-btn" onclick="setTimer(this, 0)">∞</button>
    </div>
    <div class="timer-display" id="timerDisplay"></div>
  </div>
</div>

<script>
  // ── Stars ──────────────────────────────────────────────
  const starsEl = document.getElementById('stars');
  for(let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${Math.random()*4+2}s;
      --op:${Math.random()*0.7+0.2};
      animation-delay:${Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Audio Engine ───────────────────────────────────────
  let ctx, gainNode, sourceNode, isPlaying = false;
  let currentSound = 'white';
  let timerID = null, timerEnd = null, timerMinutes = 0;

  const soundMeta = {
    white:  { name: 'Ruido Blanco', icon: '🌙', desc: 'Frecuencias uniformes' },
    pink:   { name: 'Ruido Rosa', icon: '🌸', desc: 'Suave y cálido' },
    brown:  { name: 'Ruido Marrón', icon: '🍂', desc: 'Profundo y grave' },
    rain:   { name: 'Lluvia', icon: '🌧️', desc: 'Gotas de lluvia' },
    ocean:  { name: 'Océano', icon: '🌊', desc: 'Olas del mar' },
    fan:    { name: 'Ventilador', icon: '💨', desc: 'Brisa constante' },
  };

  function initCtx() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.gain.value = 0.7;
    gainNode.connect(ctx.destination);
  }

  function generateNoise(type) {
    initCtx();
    const bufferSize = ctx.sampleRate * 4; // 4s loop
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);

    if (type === 'white' || type === 'fan') {
      const intensity = type === 'fan' ? 0.7 : 1;
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * intensity;

    } else if (type === 'pink') {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
        b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
        b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
        data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
        b6 = w * 0.115926;
      }
    } else if (type === 'brown') {
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random() * 2 - 1;
        data[i] = (last + 0.02*w) / 1.02;
        last = data[i]; data[i] *= 3.5;
      }
    } else if (type === 'rain') {
      // White noise base + random drops
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.15;
        if (Math.random() < 0.002) {
          const len = Math.floor(Math.random() * 200 + 50);
          for (let j = 0; j < len && i+j < bufferSize; j++) {
            data[i+j] += Math.sin(j * 0.3) * Math.exp(-j*0.03) * 0.6;
          }
        }
      }
    } else if (type === 'ocean') {
      // Low-freq modulated noise
      for (let i = 0; i < bufferSize; i++) {
        const t = i / ctx.sampleRate;
        const wave = Math.sin(2*Math.PI*0.15*t) * 0.5 + 0.5;
        data[i] = (Math.random() * 2 - 1) * wave * 0.8;
      }
    }

    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;

    // Filters per sound
    if (type === 'fan') {
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1200; f.Q.value = 0.5;
      src.connect(f); f.connect(gainNode);
    } else if (type === 'ocean') {
      const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 800;
      src.connect(f); f.connect(gainNode);
    } else {
      src.connect(gainNode);
    }
    return src;
  }

  function togglePlay() {
    if (isPlaying) stopSound(); else startSound();
  }

  function startSound() {
    initCtx();
    if (ctx.state === 'suspended') ctx.resume();
    if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
    sourceNode = generateNoise(currentSound);
    sourceNode.start();
    isPlaying = true;
    updateUI();
  }

  function stopSound() {
    if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode = null; }
    isPlaying = false;
    updateUI();
    clearTimerInterval();
  }

  function selectSound(btn, sound) {
    currentSound = sound;
    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('soundName').textContent = soundMeta[sound].name;
    document.getElementById('orbIcon').textContent = soundMeta[sound].icon;
    if (isPlaying) startSound();
  }

  function setVolume(val) {
    if (gainNode) gainNode.gain.setTargetAtTime(val/100, ctx?.currentTime||0, 0.05);
    const slider = document.getElementById('volSlider');
    slider.style.setProperty('--val', val + '%');
  }

  function updateUI() {
    const orb = document.getElementById('mainOrb');
    const name = document.getElementById('soundName');
    const waves = document.querySelectorAll('.wave');
    if (isPlaying) {
      orb.classList.add('playing');
      name.textContent = soundMeta[currentSound].name;
      waves.forEach(w => w.classList.add('active'));
    } else {
      orb.classList.remove('playing');
      name.textContent = 'Toca para reproducir';
      waves.forEach(w => w.classList.remove('active'));
    }
  }

  // ── Timer ──────────────────────────────────────────────
  let timerInterval = null;

  function setTimer(btn, minutes) {
    clearTimerInterval();
    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timerMinutes = minutes;
    if (minutes === 0) {
      document.getElementById('timerDisplay').textContent = 'Sin límite';
      return;
    }
    timerEnd = Date.now() + minutes * 60000;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      if (Date.now() >= timerEnd) {
        stopSound();
        clearTimerInterval();
        document.getElementById('timerDisplay').textContent = 'Temporizador finalizado';
      } else {
        updateTimerDisplay();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const rem = Math.max(0, timerEnd - Date.now());
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('timerDisplay').textContent =
      `Apagado en ${m}:${String(s).padStart(2,'0')}`;
  }

  function clearTimerInterval() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    timerEnd = null;
  }

  // Volume slider initial
  document.getElementById('volSlider').style.setProperty('--val', '70%');

  // Sound name initial
  document.getElementById('soundName').textContent = 'Toca para reproducir';

  // ── Service Worker ──────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  // Keep screen awake (Wake Lock API)
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        await navigator.wakeLock.request('screen');
      }
    } catch(e){}
  }
  document.getElementById('mainOrb').addEventListener('click', requestWakeLock);
</script>
</body>
</html>

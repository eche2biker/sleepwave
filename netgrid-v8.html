<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NETGRID</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020c04;overflow:hidden;font-family:'Share Tech Mono',monospace}

::-webkit-scrollbar-track{background:#020c04}
::-webkit-scrollbar-thumb{background:#00ff2228;border-radius:3px}
input[type=range]{-webkit-appearance:none;background:transparent;height:16px}
input[type=range]::-webkit-slider-runnable-track{background:#00ff2215;height:3px;border-radius:2px}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useReducer} = React;

// ─────────────────────────────────────────────────────────────────────────────
// PERSISTENCIA — localStorage
// ─────────────────────────────────────────────────────────────────────────────
const LS_KEY = 'netgrid_v8';

function loadDB() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveDB(db) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
const nowDT = () => new Date().toLocaleString('es-MX',{hour12:false});
const nowT  = () => new Date().toLocaleTimeString('es-MX',{hour12:false});
const nowD  = () => new Date().toLocaleDateString('es-MX');

// DB inicial con datos demo
function defaultDB() {
  const demo = [
    {nombre:'PC-Recepcion',   ip:'192.168.1.10', mac:'AA:BB:CC:DD:EE:01', usuario:'mgarcia',  dept:'Recepcion',    os:'Win 11',    bitlocker:1},
    {nombre:'PC-Contabilidad',ip:'192.168.1.11', mac:'AA:BB:CC:DD:EE:02', usuario:'jlopez',   dept:'Contabilidad', os:'Win 10',    bitlocker:1},
    {nombre:'Mac-RRHH',       ip:'192.168.1.12', mac:'AA:BB:CC:DD:EE:03', usuario:'aherrera', dept:'RRHH',         os:'macOS 14',  bitlocker:0},
    {nombre:'PC-Ventas1',     ip:'192.168.1.13', mac:'AA:BB:CC:DD:EE:04', usuario:'drojas',   dept:'Ventas',       os:'Win 11',    bitlocker:1},
    {nombre:'PC-Gerencia',    ip:'192.168.1.14', mac:'AA:BB:CC:DD:EE:05', usuario:'pvega',    dept:'Direccion',    os:'Win 11',    bitlocker:2},
  ];
  const equipos = demo.map(d => ({
    id: uid(),
    nombre: d.nombre, ip: d.ip, mac: d.mac,
    usuario: d.usuario, dept: d.dept, os: d.os,
    bitlocker: d.bitlocker,  // 0=No, 1=Si, 2=Desconocido
    estado: 'ACTIVO',
    notas: '',
    archivado: false,
    archivado_motivo: null,
    archivado_at: null,
    creado_at: nowDT(),
    // credenciales
    win_user: d.usuario, win_pass: '',
    email: d.usuario+'@empresa.com', email_pass: '',
    office365: d.os.includes('Win'),
    vpn_servidor: '', vpn_usuario: '', vpn_pass: '', vpn_protocolo: 'OpenVPN',
    // listas
    carpetas: [{nombre:'\\\\servidor\\Compartida', acceso: true}],
    programas: ['Chrome','Office 365','Antivirus'],
    // historial
    historial: [{accion:'CREADO', campo:null, antes:null, despues:null, usuario_op:'sistema', ts: nowDT()}],
  }));
  return {
    equipos,
    logs: [{id:uid(), tipo:'OK', msg:'Base de datos inicializada', ts: nowDT()}],
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTES
// ─────────────────────────────────────────────────────────────────────────────
const SC    = {ACTIVO:'#00ff22', MANTENIMIENTO:'#ffff00', BAJA:'#ff2222', REEMPLAZADO:'#00aaff'};
const BLC   = {0:'#ff2222', 1:'#00ff22', 2:'#ffff00'};
const BLT   = {0:'NO', 1:'SI', 2:'?'};
const ESTADOS = ['ACTIVO','MANTENIMIENTO','BAJA','REEMPLAZADO'];
const VPNP  = ['OpenVPN','WireGuard','L2TP','PPTP','IKEv2','Cisco AnyConnect'];
const BWHY  = ['Descompuesto','Obsoleto','Robado','Actualizacion','Reemplazado','Dano fisico','Otro'];

// ─────────────────────────────────────────────────────────────────────────────
// REDUCER — toda la lógica de datos
// ─────────────────────────────────────────────────────────────────────────────
function dbReducer(db, action) {
  let next = structuredClone(db);

  function addLog(tipo, msg) {
    next.logs.unshift({id:uid(), tipo, msg, ts:nowDT()});
    if (next.logs.length > 200) next.logs = next.logs.slice(0,200);
  }

  switch(action.type) {

    case 'CREAR_EQUIPO': {
      const eq = Object.assign({
        id: uid(), estado:'ACTIVO', notas:'', archivado:false,
        archivado_motivo:null, archivado_at:null, creado_at:nowDT(),
        win_user:'', win_pass:'', email:'', email_pass:'',
        office365:false, vpn_servidor:'', vpn_usuario:'', vpn_pass:'', vpn_protocolo:'OpenVPN',
        carpetas:[], programas:[],
        historial:[{accion:'CREADO', campo:null, antes:null, despues:null, usuario_op:action.usuario||'admin', ts:nowDT()}],
      }, action.data);
      next.equipos.push(eq);
      addLog('OK', 'Equipo creado: '+eq.nombre+' ('+eq.ip+')');
      break;
    }

    case 'EDITAR_EQUIPO': {
      const idx = next.equipos.findIndex(e => e.id === action.id);
      if (idx === -1) break;
      const old = next.equipos[idx];
      const campos = ['nombre','ip','mac','usuario','dept','os','bitlocker','estado','notas',
        'win_user','win_pass','email','email_pass','office365',
        'vpn_servidor','vpn_usuario','vpn_pass','vpn_protocolo',
        'carpetas','programas'];
      const cambios = [];
      campos.forEach(c => {
        const av = JSON.stringify(old[c]), nv = JSON.stringify(action.data[c]);
        if (c in action.data && av !== nv) {
          cambios.push({accion:'EDITADO', campo:c, antes:String(old[c]??''), despues:String(action.data[c]??''), usuario_op:action.usuario||'admin', ts:nowDT()});
        }
      });
      next.equipos[idx] = Object.assign({}, old, action.data);
      if (cambios.length) {
        next.equipos[idx].historial = [...(old.historial||[]), ...cambios];
        addLog('OK', old.nombre+' actualizado — '+cambios.length+' campo(s)');
      }
      break;
    }

    case 'ARCHIVAR_EQUIPO': {
      const idx = next.equipos.findIndex(e => e.id === action.id);
      if (idx === -1) break;
      const eq = next.equipos[idx];
      next.equipos[idx] = Object.assign({}, eq, {
        archivado: true,
        archivado_motivo: action.motivo,
        archivado_at: nowDT(),
        historial: [...(eq.historial||[]), {accion:'ARCHIVADO', campo:'estado', antes:eq.estado, despues:'ARCHIVADO: '+action.motivo, usuario_op:action.usuario||'admin', ts:nowDT()}],
      });
      addLog('WARN', 'Archivado: '+eq.nombre+' — '+action.motivo);
      break;
    }

    case 'RESTAURAR_EQUIPO': {
      const idx = next.equipos.findIndex(e => e.id === action.id);
      if (idx === -1) break;
      const eq = next.equipos[idx];
      next.equipos[idx] = Object.assign({}, eq, {
        archivado: false, archivado_motivo: null, archivado_at: null, estado: 'ACTIVO',
        historial: [...(eq.historial||[]), {accion:'RESTAURADO', campo:null, antes:null, despues:null, usuario_op:action.usuario||'admin', ts:nowDT()}],
      });
      addLog('OK', 'Restaurado: '+eq.nombre);
      break;
    }

    case 'ADD_LOG': {
      addLog(action.tipo||'INFO', action.msg);
      break;
    }

    default: break;
  }

  saveDB(next);
  return next;
}

// ─────────────────────────────────────────────────────────────────────────────
// COMPONENTES UI
// ─────────────────────────────────────────────────────────────────────────────

function MatrixRain() {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const cx = cv.getContext('2d');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    const fs = 13, cols = Math.floor(cv.width/fs), drops = Array(cols).fill(1);
    const ch = '01ABCDEF9823';
    let fr, last = 0;
    const draw = ts => {
      if (ts-last > 65) { last = ts;
        cx.fillStyle = 'rgba(2,12,4,.055)'; cx.fillRect(0,0,cv.width,cv.height);
        drops.forEach((y,i) => {
          cx.fillStyle = `rgba(0,255,34,${(Math.random()*.04+.008).toFixed(3)})`;
          cx.font = fs+'px monospace';
          cx.fillText(ch[Math.floor(Math.random()*ch.length)], i*fs, y*fs);
          if (y*fs > cv.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        });
      }
      fr = requestAnimationFrame(draw);
    };
    fr = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(fr);
  }, []);
  return <canvas ref={ref} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,opacity:.28}}/>;
}

function Sec({title, icon, color, children, open: initOpen}) {
  const [open, setOpen] = useState(initOpen !== false);
  const c = color || '#00ff22';
  return (
    <div style={{marginBottom:8, border:`1px solid ${c}18`, borderRadius:6, overflow:'hidden'}}>
      <div onClick={() => setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:`${c}0a`,cursor:'pointer',userSelect:'none'}}>
        <span style={{fontSize:14}}>{icon}</span>
        <span style={{fontSize:8,letterSpacing:3,color:c,flex:1,fontWeight:700}}>{title}</span>
        <span style={{fontSize:9,color:c,opacity:.4}}>{open ? '▾' : '▸'}</span>
      </div>
      {open && <div style={{padding:'12px',background:'#020c04'}}>{children}</div>}
    </div>
  );
}

function PwdField({label, val, onChange, inp, ac}) {
  const [show, setShow] = useState(false);
  const c = ac || '#00ff22';
  return (
    <div>
      <div style={{fontSize:7,letterSpacing:2,opacity:.35,marginBottom:3}}>{label}</div>
      <div style={{position:'relative'}}>
        <input type={show?'text':'password'} value={val||''} onChange={onChange}
          style={{...inp, paddingRight:28}}
          onFocus={e => e.target.style.borderColor = c}
          onBlur={e => e.target.style.borderColor = '#00ff2218'}/>
        <span onClick={() => setShow(s=>!s)}
          style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:10,opacity:.45,color:c,userSelect:'none'}}>
          {show ? 'O' : '*'}
        </span>
      </div>
    </div>
  );
}

function ItemList({items, onToggle, onAdd, onDel, canEdit, color, showCheck}) {
  const [adding, setAdding] = useState(false);
  const [val, setVal] = useState('');
  const c = color || '#00ff22';
  const commit = () => { if (val.trim()) { onAdd(val.trim()); setVal(''); } setAdding(false); };
  return (
    <div>
      {items.length === 0 && !adding && <div style={{fontSize:9,opacity:.2,textAlign:'center',padding:8}}>VACIO</div>}
      {items.map((item, i) => {
        const nombre = typeof item === 'string' ? item : item.nombre;
        const acceso = typeof item === 'object' && item.acceso !== undefined ? !!item.acceso : undefined;
        return (
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,padding:'5px 8px',background:'#030e05',borderRadius:4,border:`1px solid ${acceso===false?'#ff222218':c+'18'}`}}>
            {showCheck && <div onClick={() => canEdit && onToggle(i)}
              style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${acceso?c:'#444'}`,background:acceso?c+'22':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:canEdit?'pointer':'default',flexShrink:0}}>
              {acceso && <span style={{fontSize:9,color:c,lineHeight:1}}>v</span>}
            </div>}
            <span style={{flex:1,fontSize:9,color:acceso===false?'#ff222260':'#00ff22',wordBreak:'break-all'}}>{nombre}</span>
            {canEdit && <span onClick={() => onDel(i)} style={{cursor:'pointer',fontSize:10,color:'#ff222240',flexShrink:0}} onMouseOver={e=>e.target.style.color='#ff2222'} onMouseOut={e=>e.target.style.color='#ff222240'}>X</span>}
          </div>
        );
      })}
      {canEdit && (adding
        ? <div style={{display:'flex',gap:6,marginTop:6}}>
            <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setAdding(false);}}
              style={{flex:1,background:'#0a180a',border:`1px solid ${c}40`,color:'#00ff22',fontFamily:'monospace',fontSize:10,padding:'5px 8px',borderRadius:4,outline:'none'}}/>
            <button onClick={commit} style={{padding:'4px 10px',background:`${c}18`,border:`1px solid ${c}`,color:c,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>OK</button>
            <button onClick={()=>setAdding(false)} style={{padding:'4px 8px',background:'transparent',border:'1px solid #333',color:'#555',fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>X</button>
          </div>
        : <button onClick={()=>setAdding(true)} style={{marginTop:6,padding:'4px 10px',background:'transparent',border:`1px dashed ${c}35`,color:c,opacity:.6,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4,width:'100%'}} onMouseOver={e=>e.currentTarget.style.opacity='1'} onMouseOut={e=>e.currentTarget.style.opacity='.6'}>+ Agregar</button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PC CARD
// ─────────────────────────────────────────────────────────────────────────────
function PCCard({eq, onEdit, selected, onSelect}) {
  const [hov, setHov] = useState(false);
  const sc = SC[eq.estado] || '#00ff22';
  const uptimeDate = eq.creado_at ? eq.creado_at.slice(0,10) : '--';
  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{width:118,minWidth:118,height:128,flexShrink:0,position:'relative',userSelect:'none',
        background: selected ? '#001520' : hov ? '#071a07' : '#040d04',
        border: `1px solid ${selected?'#00aaff':hov?sc:sc+(eq.archivado?'18':'30')}`,
        borderRadius:8, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3,
        cursor:'pointer', transition:'all .15s', opacity: eq.archivado ? .45 : 1,
        boxShadow: hov && !eq.archivado ? `0 0 14px ${sc}18` : 'none', animation:'fadein .3s ease'}}>

      {/* LED */}
      <div style={{position:'absolute',top:7,right:7,width:8,height:8,borderRadius:'50%',background:sc,boxShadow:`0 0 6px ${sc}`,animation:eq.estado==='ACTIVO'&&!eq.archivado?'glow 2.5s infinite':'pulse 1s infinite'}}/>

      {/* BitLocker badge */}
      <div style={{position:'absolute',top:6,left:6,background:`${BLC[eq.bitlocker]}15`,border:`1px solid ${BLC[eq.bitlocker]}40`,borderRadius:3,padding:'1px 5px',fontSize:6,color:BLC[eq.bitlocker],letterSpacing:1}}>
        BL:{BLT[eq.bitlocker]}
      </div>

      {/* Checkbox */}
      <div onClick={e=>{e.stopPropagation();onSelect(eq.id);}}
        style={{position:'absolute',bottom:5,right:5,width:10,height:10,borderRadius:2,border:`1px solid ${selected?'#00aaff':'#2a2a2a'}`,background:selected?'#00aaff':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#000'}}>
        {selected?'v':''}
      </div>

      {/* Icono */}
      <svg viewBox="0 0 46 40" width="36" height="30" fill="none">
        <rect x="3" y="3" width="40" height="26" rx="3" fill={eq.estado==='ACTIVO'?'#061a06':'#100608'} stroke={sc} strokeWidth="1.4" opacity=".9"/>
        <rect x="6" y="6" width="34" height="20" rx="1.5" fill="#010901" stroke={sc} strokeWidth=".5" opacity=".5"/>
        {eq.estado==='ACTIVO' && <>
          <rect x="8" y="8" width="20" height="1.5" rx=".5" fill="#00ff22" opacity=".2"/>
          <rect x="8" y="11" width="14" height="1.5" rx=".5" fill="#00ff22" opacity=".12"/>
        </>}
        <rect x="19" y="29" width="8" height="3" rx="1" fill={sc} opacity=".2"/>
        <rect x="9" y="32" width="28" height="2" rx="1" fill={sc} opacity=".14"/>
      </svg>

      <div style={{fontSize:8,color:sc,fontWeight:700,maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{eq.nombre}</div>
      <div style={{fontSize:7,color:'#00ff22',opacity:.45,maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{eq.ip}</div>
      {eq.mac && <div style={{fontSize:6,opacity:.22,maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textAlign:'center'}}>{eq.mac}</div>}
      <div style={{fontSize:6,opacity:.22,color:'#00ff22'}}>desde {uptimeDate}</div>
      {eq.archivado && <div style={{fontSize:6,color:'#ff8800',opacity:.7,letterSpacing:2,marginTop:2}}>ARCHIVADO</div>}

      {hov && <div onClick={() => onEdit(eq.id)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.82)',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,cursor:'pointer'}}>
        <span style={{fontSize:10,color:sc,letterSpacing:2}}>{eq.archivado?'VER':'EDITAR'}</span>
        {eq.dept && <span style={{fontSize:7,color:sc,opacity:.5}}>{eq.dept}</span>}
        {eq.usuario && <span style={{fontSize:7,color:'#0a2',opacity:.65}}>{eq.usuario}</span>}
      </div>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL PC — edición completa con tabs
// ─────────────────────────────────────────────────────────────────────────────
function PCModal({eqId, equipos, dispatch, onClose, showToast}) {
  const orig = equipos.find(e => e.id === eqId);
  const [d, setD] = useState(orig ? structuredClone(orig) : null);
  const [tab, setTab] = useState('info');
  if (!d) return null;

  const s = (k,v) => setD(p => ({...p, [k]:v}));
  const inp = {background:'#0a180a',border:'1px solid #00ff2218',color:'#00ff22',fontFamily:'monospace',fontSize:11,padding:'6px 9px',width:'100%',borderRadius:4,outline:'none',boxSizing:'border-box'};
  const sc = SC[d.estado] || '#00ff22';

  const handleSave = () => {
    dispatch({type:'EDITAR_EQUIPO', id:d.id, data:d, usuario:'admin'});
    showToast(d.nombre+' guardado');
    onClose();
  };

  const F = (label, key, ph, ac) => (
    <div key={key}>
      <div style={{fontSize:7,letterSpacing:2,opacity:.35,marginBottom:3}}>{label}</div>
      <input value={d[key]||''} onChange={e=>s(key,e.target.value)} placeholder={ph||''}
        style={inp} onFocus={e=>e.target.style.borderColor=ac||'#00ff22'} onBlur={e=>e.target.style.borderColor='#00ff2218'}/>
    </div>
  );

  const TB = (t, label) => (
    <button onClick={()=>setTab(t)} style={{flex:1,padding:'7px 0',background:tab===t?'#00ff2208':'transparent',border:'none',borderBottom:tab===t?'2px solid #00ff22':'2px solid transparent',color:tab===t?'#00ff22':'#00ff2225',fontFamily:'monospace',fontSize:7,letterSpacing:2,cursor:'pointer',transition:'all .15s'}}>{label}</button>
  );

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,8,2,.93)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,backdropFilter:'blur(8px)'}}>
      <div style={{background:'#030e05',border:'1px solid #00ff2228',borderRadius:10,width:560,maxHeight:'94vh',display:'flex',flexDirection:'column',fontFamily:'monospace',color:'#00ff22',animation:'popin .18s ease',boxShadow:'0 0 50px #00ff2208'}}>

        {/* Header */}
        <div style={{padding:'16px 20px 0',borderBottom:'1px solid #00ff2210',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontSize:15,letterSpacing:3,fontWeight:700}}>{d.nombre}</div>
              <div style={{fontSize:7,opacity:.3,marginTop:2,letterSpacing:1}}>
                REGISTRADO: {d.creado_at ? d.creado_at.slice(0,16) : '--'}
                {d.archivado && ` · ARCHIVADO: ${d.archivado_at?.slice(0,16)||'--'}`}
              </div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <div style={{padding:'3px 8px',background:`${SC[d.estado]}15`,border:`1px solid ${SC[d.estado]}35`,borderRadius:3,fontSize:8,color:SC[d.estado],letterSpacing:2}}>{d.estado}</div>
              <div style={{padding:'3px 8px',background:`${BLC[d.bitlocker]}12`,border:`1px solid ${BLC[d.bitlocker]}30`,borderRadius:3,fontSize:8,color:BLC[d.bitlocker]}}>BL:{BLT[d.bitlocker]}</div>
              <button onClick={onClose} style={{padding:'3px 10px',background:'transparent',border:'1px solid #333',color:'#555',fontFamily:'monospace',fontSize:11,cursor:'pointer',borderRadius:3}}>X</button>
            </div>

// ─────────────────────────────────────────────────────────────────────────────
// APP PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [db, dispatch] = useReducer(dbReducer, null, () => loadDB() || defaultDB());
  const [editId,    setEditId]    = useState(null);
  const [showNuevo, setShowNuevo] = useState(false);
  const [archiveEq, setArchiveEq] = useState(null);
  const [search,    setSearch]    = useState('');
  const [fEstado,   setFEstado]   = useState('TODOS');
  const [fBL,       setFBL]       = useState('TODOS');
  const [fArchiv,   setFArchiv]   = useState(false);
  const [selIds,    setSelIds]    = useState(new Set());
  const [panel,     setPanel]     = useState('LOGS');
  const [time,      setTime]      = useState(nowT());
  const [toast,     setToast]     = useState(null);
  const toastRef = useRef(null);

  useEffect(() => { const t = setInterval(() => setTime(nowT()), 1000); return () => clearInterval(t); }, []);

  const showToast = (msg, type) => {
    if (toastRef.current) clearTimeout(toastRef.current);
    setToast({msg, type: type||'ok'});
    toastRef.current = setTimeout(() => setToast(null), 2800);
  };

  const stats = useMemo(() => {
    const eq = db.equipos;
    const activos = eq.filter(e => !e.archivado);
    return {
      total:        activos.length,
      archivados:   eq.filter(e => e.archivado).length,
      activo:       activos.filter(e => e.estado==='ACTIVO').length,
      mantenimiento:activos.filter(e => e.estado==='MANTENIMIENTO').length,
      baja:         activos.filter(e => e.estado==='BAJA').length,
      reemplazado:  activos.filter(e => e.estado==='REEMPLAZADO').length,
      bl_si:        activos.filter(e => e.bitlocker===1).length,
      bl_no:        activos.filter(e => e.bitlocker===0).length,
      bl_dk:        activos.filter(e => e.bitlocker===2).length,
      por_dept: Object.entries(activos.reduce((a,e) => { const d=e.dept||'Sin depto'; a[d]=(a[d]||0)+1; return a; }, {})).sort((a,b)=>b[1]-a[1]),
      por_os:   Object.entries(activos.reduce((a,e) => { const o=e.os||'Desconocido'; a[o]=(a[o]||0)+1; return a; }, {})).sort((a,b)=>b[1]-a[1]),
    };
  }, [db.equipos]);

  const pct = stats.total ? Math.round(stats.activo / stats.total * 100) : 0;

  const filtrados = useMemo(() => {
    let base = db.equipos.filter(e => e.archivado === fArchiv);
    if (fEstado !== 'TODOS') base = base.filter(e => e.estado === fEstado);
    if (fBL !== 'TODOS')     base = base.filter(e => String(e.bitlocker) === String(fBL));
    if (search) {
      const s = search.toLowerCase();
      base = base.filter(e =>
        (e.nombre||'').toLowerCase().includes(s) ||
        (e.ip||'').includes(s) ||
        (e.mac||'').toLowerCase().includes(s) ||
        (e.usuario||'').toLowerCase().includes(s) ||
        (e.dept||'').toLowerCase().includes(s)
      );
    }
    return base;
  }, [db.equipos, fEstado, fBL, fArchiv, search]);

  const mapaGrupos = useMemo(() => {
    const g = {};
    db.equipos.forEach(e => {
      const d = e.dept || 'Sin depto';
      if (!g[d]) g[d] = [];
      g[d].push(e);
    });
    return g;
  }, [db.equipos]);

  const toggleSel = id => setSelIds(p => { const n = new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });

  const bulkArchivar = () => {
    if (!selIds.size) return;
    selIds.forEach(id => dispatch({type:'ARCHIVAR_EQUIPO', id, motivo:'Archivado en lote', usuario:'admin'}));
    showToast(selIds.size+' equipos archivados','warn');
    setSelIds(new Set());
  };

  const fb = (active, col) => ({padding:'4px 10px',background:active?`${col}15`:'transparent',border:`1px solid ${active?col:`${col}25`}`,color:active?col:`${col}50`,fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:3,transition:'all .12s'});

  // Panel STATS
  const StatsPanel = () => {
    const Bar = ({v,max,c}) => <div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden',marginTop:3}}><div style={{height:'100%',width:Math.round(v/Math.max(max,1)*100)+'%',background:c,transition:'width .6s'}}/></div>;
    return (
      <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:12}}>METRICAS</div>
        {[{l:'ACTIVOS',v:stats.activo,c:'#00ff22'},{l:'MANTENIMIENTO',v:stats.mantenimiento,c:'#ffff00'},{l:'BAJA',v:stats.baja,c:'#ff2222'},{l:'REEMPLAZADO',v:stats.reemplazado,c:'#00aaff'},{l:'ARCHIVADOS',v:stats.archivados,c:'#ff8800'}].map(item=>(
          <div key={item.l} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:7,color:item.c,opacity:.7}}>{item.l}</span>
              <span style={{fontSize:11,color:item.c,fontWeight:700}}>{item.v}</span>
            </div>
            <Bar v={item.v} max={stats.total||1} c={item.c}/>
          </div>
        ))}
        <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>BITLOCKER</div>
        {[{l:'ACTIVO',v:stats.bl_si,c:'#00ff22'},{l:'INACTIVO',v:stats.bl_no,c:'#ff2222'},{l:'DESCONOCIDO',v:stats.bl_dk,c:'#ffff00'}].map(item=>(
          <div key={item.l} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:7,color:item.c,opacity:.7}}>{item.l}</span>
              <span style={{fontSize:11,color:item.c,fontWeight:700}}>{item.v}</span>
            </div>
            <Bar v={item.v} max={stats.total||1} c={item.c}/>
          </div>
        ))}
        {stats.por_dept.length > 0 && <>
          <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
          <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:8}}>POR DEPTO</div>
          {stats.por_dept.map(([d,v])=>(
            <div key={d} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:7,opacity:.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{d}</span>
              <span style={{fontSize:9,color:'#00ff22',fontWeight:700}}>{v}</span>
            </div>
          ))}
        </>}
        {stats.por_os.length > 0 && <>
          <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
          <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:8}}>POR OS</div>
          {stats.por_os.map(([o,v])=>(
            <div key={o} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:7,opacity:.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{o}</span>
              <span style={{fontSize:9,color:'#00ff22',fontWeight:700}}>{v}</span>
            </div>
          ))}
        </>}
      </div>
    );
  };

  // Panel MAPA
  const MapaPanel = () => (
    <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>MAPA — {db.equipos.length} equipos</div>
      {Object.entries(mapaGrupos).map(([dept,eqs]) => (
        <div key={dept} style={{marginBottom:14}}>
          <div style={{fontSize:6,letterSpacing:2,opacity:.28,marginBottom:5}}>{dept.toUpperCase()} ({eqs.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {eqs.map(eq => (
              <div key={eq.id} title={`${eq.nombre} — ${eq.ip} — ${eq.estado}`}
                onClick={() => setEditId(eq.id)}
                style={{width:14,height:14,borderRadius:2,cursor:'pointer',background:eq.archivado?'#333':SC[eq.estado],opacity:eq.archivado?.25:1,boxShadow:eq.estado==='ACTIVO'&&!eq.archivado?'0 0 4px #00ff2250':'none',transition:'all .3s'}}/>
            ))}
          </div>
        </div>
      ))}
    </div>
  );

  // Panel LOGS
  const LogsPanel = () => {
    const tc = {OK:'#00ff22',INFO:'#00ff22',WARN:'#ff8800',ERROR:'#ff2222'};
    return (
      <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>AUDITORIA ({db.logs.length})</div>
        {db.logs.map((l,i) => (
          <div key={l.id||i} style={{display:'flex',gap:6,marginBottom:7,opacity:Math.max(.12,1-i*.015),animation:i===0?'fadein .25s ease':'none'}}>
            <span style={{fontSize:6,color:'#00ff22',opacity:.25,whiteSpace:'nowrap',flexShrink:0}}>{(l.ts||'').slice(11,16)}</span>
            <span style={{fontSize:7,color:tc[l.tipo]||'#00ff22',wordBreak:'break-word',lineHeight:1.4}}>{l.tipo==='WARN'||l.tipo==='ERROR'?'! ':''}{l.msg}</span>
          </div>
        ))}
        {db.logs.length === 0 && <div style={{fontSize:8,opacity:.2,textAlign:'center',marginTop:20}}>Sin logs</div>}
      </div>
    );
  };

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#020c04',color:'#00ff22',overflow:'hidden',position:'relative',fontFamily:"'Share Tech Mono',monospace"}}>
      <MatrixRain/>

      {/* ── TOP BAR ── */}
      <div style={{position:'relative',zIndex:10,background:'rgba(2,9,3,.97)',borderBottom:'1px solid #00ff2210',backdropFilter:'blur(5px)',flexShrink:0}}>
        {/* Fila 1 */}
        <div style={{display:'flex',alignItems:'center',padding:'8px 20px',gap:16,flexWrap:'wrap'}}>
          <div style={{flexShrink:0}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:18,fontWeight:900,letterSpacing:6,color:'#00ff22',textShadow:'0 0 22px #00ff22'}}>NETGRID</div>
            <div style={{fontSize:6,letterSpacing:5,opacity:.25}}>100% LOCAL — localStorage</div>
          </div>
          <div style={{width:1,height:36,background:'#00ff2210',flexShrink:0}}/>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:15,letterSpacing:3,flexShrink:0}}>{time}</div>
          <div style={{width:1,height:36,background:'#00ff2210',flexShrink:0}}/>
          {[
            {l:'TOTAL',    v:stats.total,       c:'#00ff22'},
            {l:'ACTIVOS',  v:stats.activo,      c:'#00ff22'},
            {l:'MANT',     v:stats.mantenimiento,c:'#ffff00'},
            {l:'BAJA',     v:stats.baja,        c:'#ff2222'},
            {l:'BL SI',    v:stats.bl_si,       c:'#00ff22'},
            {l:'BL NO',    v:stats.bl_no,       c:'#ff2222'},
            {l:'BL ?',     v:stats.bl_dk,       c:'#ffff00'},
          ].map(item => (
            <div key={item.l} style={{textAlign:'center',minWidth:36}}>
              <div style={{fontSize:6,letterSpacing:1,opacity:.28,marginBottom:1}}>{item.l}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:15,fontWeight:700,color:item.c,textShadow:`0 0 6px ${item.c}`}}>{item.v}</div>
            </div>
          ))}
          <div style={{width:1,height:36,background:'#00ff2210',flexShrink:0}}/>
          <div style={{minWidth:80,flexShrink:0}}>
            <div style={{fontSize:6,opacity:.25,marginBottom:3,textAlign:'center'}}>DISPONIB.</div>
            <div style={{height:4,background:'#0a1a0a',borderRadius:2,overflow:'hidden',marginBottom:2}}>
              <div style={{height:'100%',width:pct+'%',background:pct>80?'linear-gradient(90deg,#0a2,#00ff22)':pct>50?'linear-gradient(90deg,#aa6,#ffff00)':'linear-gradient(90deg,#800,#ff2222)',transition:'width .8s'}}/>
            </div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:14,textAlign:'center',fontWeight:700,color:pct>80?'#00ff22':pct>50?'#ffff00':'#ff2222'}}>{pct}%</div>
          </div>
          <div style={{flex:1}}/>
          <button onClick={() => setShowNuevo(true)}
            style={{padding:'7px 16px',background:'#0a1a0a',border:'1px solid #00ff22',color:'#00ff22',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:4,flexShrink:0}}
            onMouseOver={e=>e.currentTarget.style.background='#0f2210'} onMouseOut={e=>e.currentTarget.style.background='#0a1a0a'}>
            + EQUIPO
          </button>
        </div>

        {/* Fila 2: filtros */}
        <div style={{display:'flex',alignItems:'center',padding:'6px 20px',gap:7,borderTop:'1px solid #00ff2208',flexWrap:'wrap'}}>
          <div style={{position:'relative'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nombre, IP, MAC, usuario, depto..."
              style={{background:'#0a160a',border:'1px solid #00ff2215',color:'#00ff22',fontFamily:'monospace',fontSize:9,padding:'5px 9px',borderRadius:4,outline:'none',width:270}}
              onFocus={e=>e.target.style.borderColor='#00ff22'} onBlur={e=>e.target.style.borderColor='#00ff2215'}/>
            {search && <span onClick={()=>setSearch('')} style={{position:'absolute',right:7,top:'50%',transform:'translateY(-50%)',cursor:'pointer',opacity:.4,fontSize:9}}>X</span>}
          </div>
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          {['TODOS',...ESTADOS].map(f => <button key={f} onClick={()=>setFEstado(f)} style={fb(fEstado===f,f==='TODOS'?'#00ff22':SC[f])}>{f}</button>)}
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          <span style={{fontSize:7,opacity:.3}}>BL:</span>
          {[['TODOS','#00ff22'],['1','#00ff22'],['0','#ff2222'],['2','#ffff00']].map(([v,c]) => <button key={v} onClick={()=>setFBL(v)} style={fb(fBL===v,c)}>{v==='TODOS'?'TODOS':v==='1'?'SI':v==='0'?'NO':'?'}</button>)}
          <div style={{width:1,height:20,background:'#00ff2210'}}/>
          <button onClick={()=>{setFArchiv(a=>!a); setFEstado('TODOS'); setFBL('TODOS');}} style={fb(fArchiv,'#ff8800')}>ARCHIVADOS</button>
          {selIds.size > 0 && <>
            <div style={{width:1,height:20,background:'#00ff2210'}}/>
            <span style={{fontSize:8,color:'#00aaff'}}>{selIds.size} sel</span>
            <button onClick={bulkArchivar} style={fb(false,'#ff8800')}>ARCHIVAR SEL</button>
            <button onClick={()=>setSelIds(new Set())} style={{padding:'3px 7px',background:'transparent',border:'1px solid #222',color:'#444',fontFamily:'monospace',fontSize:8,cursor:'pointer',borderRadius:3}}>X</button>
          </>}
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative',zIndex:5}}>
        {/* Grid */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 18px'}}>
          {filtrados.length === 0
            ? <div style={{textAlign:'center',padding:'70px 20px',opacity:.2,fontSize:10,letterSpacing:3}}>
                {fArchiv ? 'SIN EQUIPOS ARCHIVADOS' : db.equipos.length===0 ? 'SIN EQUIPOS — PRESIONA + EQUIPO' : 'SIN RESULTADOS'}
              </div>
            : <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {filtrados.map(eq => (
                  <PCCard key={eq.id} eq={eq} onEdit={setEditId} selected={selIds.has(eq.id)} onSelect={toggleSel}/>
                ))}
              </div>
          }
        </div>

        {/* Panel lateral */}
        <div style={{width:245,borderLeft:'1px solid #00ff2210',background:'rgba(2,9,3,.97)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{display:'flex',borderBottom:'1px solid #00ff2210',flexShrink:0}}>
            {['LOGS','STATS','MAPA'].map(t => (
              <button key={t} onClick={()=>setPanel(t)} style={{flex:1,padding:'8px 0',background:panel===t?'#00ff2206':'transparent',border:'none',borderBottom:panel===t?'2px solid #00ff22':'2px solid transparent',color:panel===t?'#00ff22':'#00ff2225',fontFamily:'monospace',fontSize:7,letterSpacing:3,cursor:'pointer',transition:'all .15s'}}>{t}</button>
            ))}
          </div>
          {panel==='LOGS'  && <LogsPanel/>}
          {panel==='STATS' && <StatsPanel/>}
          {panel==='MAPA'  && <MapaPanel/>}
        </div>
      </div>

      {/* Status bar */}
      <div style={{position:'relative',zIndex:10,borderTop:'1px solid #00ff2210',background:'rgba(2,9,3,.97)',padding:'4px 20px',display:'flex',gap:16,fontSize:7,letterSpacing:2,opacity:.35,alignItems:'center',flexShrink:0}}>
        <span style={{animation:'pulse 2s infinite'}}>o</span>
        <span>NETGRID · localStorage · {nowD()}</span>
        <span>TOTAL: {stats.total}</span>
        <span style={{color:'#00ff22'}}>ACTIVOS: {stats.activo}</span>
        <span style={{color:'#ff2222'}}>BAJA: {stats.baja}</span>
        <span style={{color:'#00ff22'}}>BL SI: {stats.bl_si}</span>
        <span style={{color:'#ff2222'}}>BL NO: {stats.bl_no}</span>
        <div style={{flex:1}}/>
        <span style={{animation:'blink 1s infinite'}}>_</span>
      </div>

      {/* Toast */}
      {toast && <div style={{position:'fixed',bottom:26,right:26,zIndex:5000,background:'rgba(3,14,5,.97)',border:`1px solid ${toast.type==='warn'?'#ff8800':'#00ff22'}`,color:toast.type==='warn'?'#ff8800':'#00ff22',padding:'9px 20px',borderRadius:4,fontFamily:'monospace',fontSize:9,letterSpacing:2,animation:'fadein .2s ease'}}>
        {toast.type==='warn'?'! ':''}{toast.msg.toUpperCase()}
      </div>}

      {/* Modales */}
      {editId    && <PCModal eqId={editId} equipos={db.equipos} dispatch={dispatch} onClose={()=>setEditId(null)} showToast={showToast}/>}
      {showNuevo && <NuevoModal dispatch={dispatch} onClose={()=>setShowNuevo(false)} showToast={showToast}/>}
      {archiveEq && <ArchivarModal eq={archiveEq} dispatch={dispatch} onClose={()=>setArchiveEq(null)} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NETGRID</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020c04;overflow:hidden;font-family:'Share Tech Mono',monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#020c04}
::-webkit-scrollbar-thumb{background:#00ff2228;border-radius:3px}
select option{background:#030e05;color:#00ff22}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes popin{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px #00ff22}50%{box-shadow:0 0 16px #00ff22,0 0 30px #00ff2230}}
@keyframes warn{0%,100%{box-shadow:0 0 5px #ff2222}50%{box-shadow:0 0 14px #ff2222,0 0 28px #ff222230}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useReducer,useCallback} = React;

// ── STORAGE ───────────────────────────────────────────────────────────────────
const LS_KEY = 'netgrid_v9';
const loadDB  = () => { try { const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null; } catch(e){return null;} };
const saveDB  = db => { try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e){} };
const uid     = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const nowDT   = () => new Date().toLocaleString('es-MX',{hour12:false});
const nowT    = () => new Date().toLocaleTimeString('es-MX',{hour12:false});
const nowD    = () => new Date().toLocaleDateString('es-MX');
// Siempre devolver número entero para bitlocker
const blNum   = v => { const n=parseInt(v); return isNaN(n)?2:n; };

// ── DEMO DATA ─────────────────────────────────────────────────────────────────
function defaultDB() {
  const rows = [
    {nombre:'PC-Recepcion',    ip:'192.168.1.10', mac:'AA:BB:CC:DD:EE:01', usuario:'mgarcia',  dept:'Recepcion',    os:'Win 11',   bitlocker:1, ubicacion:'Piso 1 - Lobby',         ultimo_mant:'2025-11-15'},
    {nombre:'PC-Contabilidad', ip:'192.168.1.11', mac:'AA:BB:CC:DD:EE:02', usuario:'jlopez',   dept:'Contabilidad', os:'Win 10',   bitlocker:1, ubicacion:'Piso 2 - Sala A',         ultimo_mant:'2025-10-03'},
    {nombre:'Mac-RRHH',        ip:'192.168.1.12', mac:'AA:BB:CC:DD:EE:03', usuario:'aherrera', dept:'RRHH',         os:'macOS 14', bitlocker:0, ubicacion:'Piso 2 - Sala B',         ultimo_mant:'2025-09-20'},
    {nombre:'PC-Ventas1',      ip:'192.168.1.13', mac:'AA:BB:CC:DD:EE:04', usuario:'drojas',   dept:'Ventas',       os:'Win 11',   bitlocker:1, ubicacion:'Piso 1 - Oficina Ventas', ultimo_mant:'2026-01-10'},
    {nombre:'PC-Gerencia',     ip:'192.168.1.14', mac:'AA:BB:CC:DD:EE:05', usuario:'pvega',    dept:'Direccion',    os:'Win 11',   bitlocker:2, ubicacion:'Piso 3 - Direccion',      ultimo_mant:''},
    {nombre:'PC-Soporte',      ip:'192.168.1.15', mac:'AA:BB:CC:DD:EE:06', usuario:'lramos',   dept:'TI',           os:'Win 11',   bitlocker:1, ubicacion:'Sotano - Servidores',     ultimo_mant:'2026-02-01'},
  ];
  const equipos = rows.map(d => ({

    office365:d.os.includes('Win'), vpn_servidor:'', vpn_usuario:'', vpn_pass:'', vpn_protocolo:'OpenVPN',
    carpetas:[{nombre:'\\\\servidor\\Compartida',acceso:true}],
    programas:['Chrome','Antivirus'],
    historial:[{accion:'CREADO',campo:null,antes:null,despues:null,usuario_op:'sistema',ts:nowDT()}],
    ...d, bitlocker:blNum(d.bitlocker),
  }));
  return { equipos, logs:[{id:uid(),tipo:'OK',msg:'NETGRID inicializado',ts:nowDT()}] };
}

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const SC    = {ACTIVO:'#00ff22',MANTENIMIENTO:'#ffff00',BAJA:'#ff2222',REEMPLAZADO:'#00aaff'};
const BLC   = {0:'#ff2222',1:'#00ff22',2:'#ffff00'};
const BLT   = {0:'NO',1:'SI',2:'?'};
const BLLABEL = {0:'INACTIVO',1:'ACTIVO',2:'DESCONOCIDO'};
const ESTADOS = ['ACTIVO','MANTENIMIENTO','BAJA','REEMPLAZADO'];
const VPNP  = ['OpenVPN','WireGuard','L2TP','PPTP','IKEv2','Cisco AnyConnect'];
const BWHY  = ['Descompuesto','Obsoleto','Robado','Actualizacion','Reemplazado','Dano fisico','Otro'];

// ── REDUCER ───────────────────────────────────────────────────────────────────
function dbReducer(db, action) {
  const next = structuredClone(db);
  const addLog = (tipo,msg) => { next.logs.unshift({id:uid(),tipo,msg,ts:nowDT()}); if(next.logs.length>300)next.logs=next.logs.slice(0,300); };

  if(action.type === 'CREAR_EQUIPO') {
    const eq = { id:uid(),estado:'ACTIVO',notas:'',archivado:false,archivado_motivo:null,archivado_at:null,creado_at:nowDT(),
      win_user:'',win_pass:'',email:'',email_pass:'',office365:false,vpn_servidor:'',vpn_usuario:'',vpn_pass:'',vpn_protocolo:'OpenVPN',
      carpetas:[],programas:[],historial:[{accion:'CREADO',campo:null,antes:null,despues:null,usuario_op:'admin',ts:nowDT()}],
      ...action.data, bitlocker:blNum(action.data.bitlocker) };
    next.equipos.push(eq);
    addLog('OK','Creado: '+eq.nombre+' ('+eq.ip+')');
  }
  else if(action.type === 'EDITAR_EQUIPO') {
    const idx = next.equipos.findIndex(e=>e.id===action.id);
    if(idx<0) return db;
    const old = next.equipos[idx];
    const campos = ['nombre','ip','mac','usuario','dept','os','bitlocker','estado','notas','ubicacion','ultimo_mant',
      'win_user','win_pass','email','email_pass','office365','vpn_servidor','vpn_usuario','vpn_pass','vpn_protocolo','carpetas','programas'];
    const cambios = [];
    campos.forEach(c => {
      if(c in action.data) {
        const av=JSON.stringify(old[c]), nv=JSON.stringify(c==='bitlocker'?blNum(action.data[c]):action.data[c]);
        if(av!==nv) cambios.push({accion:'EDITADO',campo:c,antes:String(old[c]??''),despues:String(action.data[c]??''),usuario_op:'admin',ts:nowDT()});
      }
    });
    next.equipos[idx] = {...old, ...action.data, bitlocker:blNum(action.data.bitlocker??old.bitlocker)};
    if(cambios.length){ next.equipos[idx].historial=[...(old.historial||[]),...cambios]; addLog('OK',old.nombre+' editado'); }
  }
  else if(action.type === 'ARCHIVAR_EQUIPO') {
    const idx=next.equipos.findIndex(e=>e.id===action.id); if(idx<0) return db;
    const eq=next.equipos[idx];
    next.equipos[idx]={...eq,archivado:true,archivado_motivo:action.motivo,archivado_at:nowDT(),
      historial:[...(eq.historial||[]),{accion:'ARCHIVADO',campo:'estado',antes:eq.estado,despues:'ARCHIVADO:'+action.motivo,usuario_op:'admin',ts:nowDT()}]};
    addLog('WARN','Archivado: '+eq.nombre+' — '+action.motivo);
  }
  else if(action.type === 'RESTAURAR_EQUIPO') {
    const idx=next.equipos.findIndex(e=>e.id===action.id); if(idx<0) return db;
    const eq=next.equipos[idx];
    next.equipos[idx]={...eq,archivado:false,archivado_motivo:null,archivado_at:null,estado:'ACTIVO',
      historial:[...(eq.historial||[]),{accion:'RESTAURADO',campo:null,antes:null,despues:null,usuario_op:'admin',ts:nowDT()}]};
    addLog('OK','Restaurado: '+eq.nombre);
  }

  saveDB(next); return next;
}

// ── MATRIX RAIN ───────────────────────────────────────────────────────────────
function MatrixRain() {
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv) return;
    const cx=cv.getContext('2d');
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    const fs=13,cols=Math.floor(cv.width/fs),drops=Array(cols).fill(1);
    const ch='01ABCDEF9823';
    let fr,last=0;
    const draw=ts=>{
      if(ts-last>65){last=ts;
        cx.fillStyle='rgba(2,12,4,.055)'; cx.fillRect(0,0,cv.width,cv.height);
        drops.forEach((y,i)=>{
          cx.fillStyle=`rgba(0,255,34,${(Math.random()*.04+.008).toFixed(3)})`;
          cx.font=fs+'px monospace';
          cx.fillText(ch[Math.floor(Math.random()*ch.length)],i*fs,y*fs);
          if(y*fs>cv.height&&Math.random()>.975)drops[i]=0; drops[i]++;
        });
      }
      fr=requestAnimationFrame(draw);
    };
    fr=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(fr);
  },[]);
  return <canvas ref={ref} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,opacity:.26}}/>;
}

// ── TOGGLE BITLOCKER — grande y visible ───────────────────────────────────────
function BLToggle({value, onChange, big}) {
  const v = blNum(value);
  const opts = [[1,'SI','#00ff22','ACTIVO'],[0,'NO','#ff2222','INACTIVO'],[2,'?','#ffff00','DESCONOCIDO']];
  if(big) return (
    <div style={{display:'flex',gap:6}}>
      {opts.map(([val,label,c,full])=>(
        <button key={val} onClick={()=>onChange(val)}
          style={{flex:1,padding:'10px 4px',background:v===val?`${c}18`:'transparent',border:`2px solid ${v===val?c:`${c}25`}`,
            color:v===val?c:`${c}55`,fontFamily:'monospace',fontSize:10,fontWeight:700,cursor:'pointer',borderRadius:5,
            transition:'all .15s',letterSpacing:1}}>
          <div style={{fontSize:16,marginBottom:3}}>{v===val?'🔒':'🔓'}</div>
          <div>{full}</div>
        </button>
      ))}
    </div>
  );
  return (
    <div style={{display:'flex',gap:4,alignItems:'center'}}>
      {opts.map(([val,label,c])=>(
        <button key={val} onClick={()=>onChange(val)}
          style={{padding:'3px 8px',background:v===val?`${c}20`:'transparent',border:`1.5px solid ${v===val?c:`${c}30`}`,
            color:v===val?c:`${c}50`,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:3,fontWeight:700,transition:'all .12s'}}>
          {label}
        </button>
      ))}
    </div>
  );
}

// ── HELPERS UI ────────────────────────────────────────────────────────────────
function Sec({title,icon,color,children,open:init}) {
  const [open,setOpen]=useState(init!==false);
  const c=color||'#00ff22';
  return (
    <div style={{marginBottom:8,border:`1px solid ${c}18`,borderRadius:6,overflow:'hidden'}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:`${c}0a`,cursor:'pointer',userSelect:'none'}}>
        <span style={{fontSize:13}}>{icon}</span>
        <span style={{fontSize:8,letterSpacing:3,color:c,flex:1,fontWeight:700}}>{title}</span>
        <span style={{fontSize:9,color:c,opacity:.4}}>{open?'▾':'▸'}</span>
      </div>
      {open&&<div style={{padding:'12px',background:'#020c04'}}>{children}</div>}
    </div>
  );
}

function PwdField({label,val,onChange,inp,ac}) {
  const [show,setShow]=useState(false);
  const c=ac||'#00ff22';
  return (
    <div>
      <div style={{fontSize:7,letterSpacing:2,opacity:.35,marginBottom:3}}>{label}</div>
      <div style={{position:'relative'}}>
        <input type={show?'text':'password'} value={val||''} onChange={onChange} style={{...inp,paddingRight:28}}
          onFocus={e=>e.target.style.borderColor=c} onBlur={e=>e.target.style.borderColor='#00ff2218'}/>
        <span onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',cursor:'pointer',fontSize:10,opacity:.4,color:c,userSelect:'none'}}>{show?'O':'*'}</span>
      </div>
    </div>
  );
}

function ItemList({items,onToggle,onAdd,onDel,canEdit,color,showCheck}) {
  const [adding,setAdding]=useState(false);
  const [val,setVal]=useState('');
  const c=color||'#00ff22';
  const commit=()=>{if(val.trim()){onAdd(val.trim());setVal('');}setAdding(false);};
  return (
    <div>
      {items.length===0&&!adding&&<div style={{fontSize:9,opacity:.2,textAlign:'center',padding:8}}>VACIO</div>}
      {items.map((item,i)=>{
        const nombre=typeof item==='string'?item:item.nombre;
        const acceso=typeof item==='object'&&item.acceso!==undefined?!!item.acceso:undefined;
        return (
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,padding:'5px 8px',background:'#030e05',borderRadius:4,border:`1px solid ${acceso===false?'#ff222218':c+'18'}`}}>
            {showCheck&&<div onClick={()=>canEdit&&onToggle(i)} style={{width:16,height:16,borderRadius:3,border:`1.5px solid ${acceso?c:'#444'}`,background:acceso?c+'22':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:canEdit?'pointer':'default',flexShrink:0}}>
              {acceso&&<span style={{fontSize:9,color:c}}>v</span>}
            </div>}
            <span style={{flex:1,fontSize:9,color:acceso===false?'#ff222260':'#00ff22',wordBreak:'break-all'}}>{nombre}</span>
            {canEdit&&<span onClick={()=>onDel(i)} style={{cursor:'pointer',fontSize:10,color:'#ff222240',flexShrink:0}} onMouseOver={e=>e.target.style.color='#ff2222'} onMouseOut={e=>e.target.style.color='#ff222240'}>X</span>}
          </div>
        );
      })}
      {canEdit&&(adding
        ?<div style={{display:'flex',gap:6,marginTop:6}}>
          <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setAdding(false);}}
            style={{flex:1,background:'#0a180a',border:`1px solid ${c}40`,color:'#00ff22',fontFamily:'monospace',fontSize:10,padding:'5px 8px',borderRadius:4,outline:'none'}}/>
          <button onClick={commit} style={{padding:'4px 10px',background:`${c}18`,border:`1px solid ${c}`,color:c,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>OK</button>
          <button onClick={()=>setAdding(false)} style={{padding:'4px 8px',background:'transparent',border:'1px solid #333',color:'#555',fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4}}>X</button>
        </div>
        :<button onClick={()=>setAdding(true)} style={{marginTop:6,padding:'4px 10px',background:'transparent',border:`1px dashed ${c}35`,color:c,opacity:.6,fontFamily:'monospace',fontSize:9,cursor:'pointer',borderRadius:4,width:'100%'}} onMouseOver={e=>e.currentTarget.style.opacity='1'} onMouseOut={e=>e.currentTarget.style.opacity='.6'}>+ Agregar</button>
      )}
    </div>
  );
}

// ── PC CARD (grid) ────────────────────────────────────────────────────────────
function PCCard({eq,onEdit,selected,onSelect}) {
  const [hov,setHov]=useState(false);
  const sc=SC[eq.estado]||'#00ff22';
  const bl=blNum(eq.bitlocker);
  const alerta=bl===0&&!eq.archivado; // Sin BitLocker = alerta roja

  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{width:148,minWidth:148,flexShrink:0,position:'relative',userSelect:'none',
        background:selected?'#001520':hov?'#071a07':'#030b03',
        border:`1px solid ${selected?'#00aaff':alerta?'#ff222245':hov?sc:sc+'28'}`,
        borderRadius:8,display:'flex',flexDirection:'column',padding:'10px 10px 8px',
        cursor:'pointer',transition:'all .15s',opacity:eq.archivado?.45:1,
        boxShadow:alerta&&!eq.archivado?'0 0 10px #ff222218':hov?`0 0 14px ${sc}18`:'none',
        animation:'fadein .25s ease'}}>

      {/* Fila top: LED + ARCHIVAR badge */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:sc,flexShrink:0,
            animation:eq.estado==='ACTIVO'&&!eq.archivado?'glow 2.5s infinite':'pulse 1s infinite'}}/>
          <span style={{fontSize:7,color:sc,letterSpacing:1,opacity:.8}}>{eq.estado}</span>
        </div>
        <div onClick={e=>{e.stopPropagation();onSelect(eq.id);}}
          style={{width:12,height:12,borderRadius:2,border:`1px solid ${selected?'#00aaff':'#333'}`,background:selected?'#00aaff':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#000',flexShrink:0}}>
          {selected&&'v'}
        </div>
      </div>

      {/* Icono PC */}
      <div style={{display:'flex',justifyContent:'center',marginBottom:7}}>
        <svg viewBox="0 0 44 36" width="36" height="28" fill="none">
          <rect x="2" y="2" width="40" height="24" rx="2.5" fill={eq.estado==='ACTIVO'?'#051505':'#100608'} stroke={sc} strokeWidth="1.4" opacity=".9"/>
          <rect x="5" y="5" width="34" height="18" rx="1.2" fill="#010901" stroke={sc} strokeWidth=".4" opacity=".5"/>
          {eq.estado==='ACTIVO'&&[0,1,2].map(i=><rect key={i} x={7} y={7+i*4} width={12+i*4} height="1.5" rx=".5" fill="#00ff22" opacity={.15-.02*i}/>)}
          <rect x="18" y="26" width="8" height="3" rx="1" fill={sc} opacity=".2"/>
          <rect x="8" y="29" width="28" height="1.5" rx=".7" fill={sc} opacity=".12"/>
        </svg>
      </div>

      {/* Nombre */}
      <div style={{fontSize:9,color:sc,fontWeight:700,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{eq.nombre}</div>

      {/* IP */}
      <div style={{fontSize:8,color:'#00ff22',opacity:.5,textAlign:'center',marginBottom:3}}>{eq.ip}</div>

      {/* MAC — siempre visible */}
      <div style={{fontSize:7,opacity:.45,textAlign:'center',letterSpacing:.5,marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#00ccff'}}>
        {eq.mac||'MAC: —'}
      </div>

      {/* BitLocker badge — grande y claro */}
      <div style={{display:'flex',justifyContent:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:4,
          background:`${BLC[bl]}15`,border:`1.5px solid ${BLC[bl]}55`}}>
          <span style={{fontSize:11}}>{bl===1?'🔒':bl===0?'🔓':'❓'}</span>
          <div>
            <div style={{fontSize:6,opacity:.4,letterSpacing:1}}>BITLOCKER</div>
            <div style={{fontSize:9,fontWeight:700,color:BLC[bl],letterSpacing:1}}>{BLLABEL[bl]}</div>
          </div>
        </div>
      </div>

      {/* Alerta sin bitlocker */}
      {alerta&&<div style={{marginTop:5,textAlign:'center',fontSize:6,color:'#ff2222',opacity:.7,letterSpacing:2,animation:'pulse 1.5s infinite'}}>! SIN CIFRADO</div>}

      {/* Archivado label */}
      {eq.archivado&&<div style={{marginTop:5,textAlign:'center',fontSize:6,color:'#ff8800',opacity:.7,letterSpacing:2}}>ARCHIVADO</div>}

      {/* Hover overlay */}
      {hov&&<div onClick={()=>onEdit(eq.id)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.84)',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,cursor:'pointer'}}>
        <span style={{fontSize:10,color:sc,letterSpacing:2}}>{eq.archivado?'VER':'EDITAR'}</span>
        {eq.dept&&<span style={{fontSize:7,color:sc,opacity:.5}}>{eq.dept}</span>}
        {eq.usuario&&<span style={{fontSize:7,color:'#00ffaa',opacity:.7}}>{eq.usuario}</span>}
        {eq.ubicacion&&<span style={{fontSize:6,opacity:.4}}>{eq.ubicacion}</span>}
      </div>}
    </div>
  );
}

// ── VISTA LISTA ───────────────────────────────────────────────────────────────
function PCRow({eq,onEdit,selected,onSelect}) {
  const sc=SC[eq.estado]||'#00ff22';
  const bl=blNum(eq.bitlocker);
  return (
    <div onClick={()=>onEdit(eq.id)} style={{display:'grid',gridTemplateColumns:'16px 1fr 110px 150px 90px 100px 100px 90px',gap:10,alignItems:'center',

      background:selected?'#001520':'transparent'}}
      onMouseOver={e=>e.currentTarget.style.background=selected?'#001520':'#040f04'}
      onMouseOut={e=>e.currentTarget.style.background=selected?'#001520':'transparent'}>
      <div onClick={e=>{e.stopPropagation();onSelect(eq.id);}} style={{width:12,height:12,borderRadius:2,border:`1px solid ${selected?'#00aaff':'#333'}`,background:selected?'#00aaff':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8}}>{selected&&'v'}</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:sc,flexShrink:0,boxShadow:`0 0 4px ${sc}`}}/>
        <span style={{fontSize:10,color:sc,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{eq.nombre}</span>
      </div>

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV(equipos) {
  const head = 'Nombre,IP,MAC,Usuario,Departamento,OS,BitLocker,Estado,Ubicacion,UltimoMant,Registrado,Archivado';
  const rows = equipos.map(e => [
    e.nombre,e.ip,e.mac||'',e.usuario||'',e.dept||'',e.os||'',
    BLLABEL[blNum(e.bitlocker)],e.estado,e.ubicacion||'',e.ultimo_mant||'',
    e.creado_at||'',e.archivado?'SI':'NO'
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [head,...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'netgrid_'+nowD().replace(/\//g,'-')+'.csv';
  a.click();
}

  const [search,setSearch]=useState('');
  const [fEstado,setFEstado]=useState('TODOS');
  const [fBL,setFBL]=useState('TODOS');
  const [fArchiv,setFArchiv]=useState(false);
  const [selIds,setSelIds]=useState(new Set());
  const [panel,setPanel]=useState('LOGS');
  const [vista,setVista]=useState('GRID'); // GRID / LISTA
  const [time,setTime]=useState(nowT());
  const [toast,setToast]=useState(null);
  const toastRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setTime(nowT()),1000);return()=>clearInterval(t);},[]);
  const showToast=(msg,type)=>{if(toastRef.current)clearTimeout(toastRef.current);setToast({msg,type:type||'ok'});toastRef.current=setTimeout(()=>setToast(null),2800);};

  const stats=useMemo(()=>{
    const act=db.equipos.filter(e=>!e.archivado);
    return {
      total:act.length, archivados:db.equipos.filter(e=>e.archivado).length,
      activo:act.filter(e=>e.estado==='ACTIVO').length,
      mantenimiento:act.filter(e=>e.estado==='MANTENIMIENTO').length,
      baja:act.filter(e=>e.estado==='BAJA').length,
      reemplazado:act.filter(e=>e.estado==='REEMPLAZADO').length,
      bl_si:act.filter(e=>blNum(e.bitlocker)===1).length,
      bl_no:act.filter(e=>blNum(e.bitlocker)===0).length,
      bl_dk:act.filter(e=>blNum(e.bitlocker)===2).length,
      sin_cifrado:act.filter(e=>blNum(e.bitlocker)===0&&e.estado==='ACTIVO').length,
      por_dept:Object.entries(act.reduce((a,e)=>{const d=e.dept||'Sin depto';a[d]=(a[d]||0)+1;return a;},{})).sort((a,b)=>b[1]-a[1]),
    };
  },[db.equipos]);

  const pct=stats.total?Math.round(stats.activo/stats.total*100):0;

  const filtrados=useMemo(()=>{
    let base=db.equipos.filter(e=>e.archivado===fArchiv);
    if(fEstado!=='TODOS') base=base.filter(e=>e.estado===fEstado);
    if(fBL!=='TODOS') base=base.filter(e=>blNum(e.bitlocker)===parseInt(fBL));
    if(search){const s=search.toLowerCase();base=base.filter(e=>(e.nombre||'').toLowerCase().includes(s)||(e.ip||'').includes(s)||(e.mac||'').toLowerCase().includes(s)||(e.usuario||'').toLowerCase().includes(s)||(e.dept||'').toLowerCase().includes(s)||(e.ubicacion||'').toLowerCase().includes(s));}
    return base;
  },[db.equipos,fEstado,fBL,fArchiv,search]);

  const mapaGrupos=useMemo(()=>{const g={};db.equipos.forEach(e=>{const d=e.dept||'Sin depto';if(!g[d])g[d]=[];g[d].push(e);});return g;},[db.equipos]);
  const toggleSel=id=>setSelIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const bulkArchivar=()=>{if(!selIds.size)return;selIds.forEach(id=>dispatch({type:'ARCHIVAR_EQUIPO',id,motivo:'Lote'}));showToast(selIds.size+' archivados','warn');setSelIds(new Set());};
  const fb=(active,col)=>({padding:'4px 10px',background:active?`${col}15`:'transparent',border:`1px solid ${active?col:`${col}25`}`,color:active?col:`${col}50`,fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:3,transition:'all .12s'});

  // ── PANELS ────────────────────────────────────────────────────────────────
  const LogsPanel=()=>{
    const tc={OK:'#00ff22',INFO:'#00ff22',WARN:'#ff8800',ERROR:'#ff2222'};
    return (
      <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>AUDITORIA ({db.logs.length})</div>
        {db.logs.map((l,i)=>(
          <div key={l.id||i} style={{display:'flex',gap:6,marginBottom:7,opacity:Math.max(.12,1-i*.013),animation:i===0?'fadein .25s ease':'none'}}>
            <span style={{fontSize:6,color:'#00ff22',opacity:.25,whiteSpace:'nowrap',flexShrink:0}}>{(l.ts||'').slice(11,16)}</span>
            <span style={{fontSize:7,color:tc[l.tipo]||'#00ff22',wordBreak:'break-word',lineHeight:1.4}}>{l.tipo==='WARN'?'! ':''}{l.msg}</span>
          </div>
        ))}
      </div>
    );
  };

  const StatsPanel=()=>{
    const Bar=({v,max,c})=><div style={{height:3,background:'#0a140a',borderRadius:2,overflow:'hidden',marginTop:3}}><div style={{height:'100%',width:Math.round(v/Math.max(max,1)*100)+'%',background:c,transition:'width .6s'}}/></div>;
    return (
      <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
        {stats.sin_cifrado>0&&<div style={{marginBottom:12,padding:'8px 10px',background:'#1a0000',border:'1px solid #ff222240',borderRadius:5,fontSize:7,color:'#ff2222',animation:'pulse 2s infinite'}}>
          ! {stats.sin_cifrado} equipo(s) SIN BitLocker activo
        </div>}
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>ESTADOS</div>
        {[{l:'ACTIVOS',v:stats.activo,c:'#00ff22'},{l:'MANTENIMIENTO',v:stats.mantenimiento,c:'#ffff00'},{l:'BAJA',v:stats.baja,c:'#ff2222'},{l:'REEMPLAZADO',v:stats.reemplazado,c:'#00aaff'},{l:'ARCHIVADOS',v:stats.archivados,c:'#ff8800'}].map(item=>(
          <div key={item.l} style={{marginBottom:9}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:7,color:item.c,opacity:.7}}>{item.l}</span>
              <span style={{fontSize:11,color:item.c,fontWeight:700}}>{item.v}</span>
            </div>
            <Bar v={item.v} max={stats.total||1} c={item.c}/>
          </div>
        ))}
        <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
        <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>BITLOCKER</div>
        {[{l:'ACTIVO 🔒',v:stats.bl_si,c:'#00ff22'},{l:'INACTIVO 🔓',v:stats.bl_no,c:'#ff2222'},{l:'DESCONOCIDO ❓',v:stats.bl_dk,c:'#ffff00'}].map(item=>(
          <div key={item.l} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:7,color:item.c,opacity:.8}}>{item.l}</span>
              <span style={{fontSize:11,color:item.c,fontWeight:700}}>{item.v}</span>
            </div>
            <Bar v={item.v} max={stats.total||1} c={item.c}/>
          </div>
        ))}
        {stats.por_dept.length>0&&<>
          <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
          <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:8}}>POR DEPTO</div>
          {stats.por_dept.map(([d,v])=>(
            <div key={d} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:7,opacity:.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:130}}>{d}</span>
              <span style={{fontSize:9,color:'#00ff22',fontWeight:700}}>{v}</span>
            </div>
          ))}
        </>}
        <div style={{height:1,background:'#00ff2210',margin:'12px 0'}}/>
        <button onClick={()=>exportCSV(db.equipos)} style={{width:'100%',padding:'7px',background:'transparent',border:'1px solid #00ff2230',color:'#00ff22',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:4,opacity:.6}} onMouseOver={e=>e.currentTarget.style.opacity='1'} onMouseOut={e=>e.currentTarget.style.opacity='.6'}>
          EXPORTAR CSV
        </button>
      </div>
    );
  };

  const MapaPanel=()=>(
    <div style={{padding:'10px 12px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:6,letterSpacing:3,opacity:.25,marginBottom:10}}>MAPA — {db.equipos.length} eq</div>
      {Object.entries(mapaGrupos).map(([dept,eqs])=>(
        <div key={dept} style={{marginBottom:12}}>
          <div style={{fontSize:6,letterSpacing:2,opacity:.28,marginBottom:5}}>{dept.toUpperCase()} ({eqs.length})</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {eqs.map(eq=>(
              <div key={eq.id} title={`${eq.nombre} | ${eq.ip} | BL:${BLT[blNum(eq.bitlocker)]}`}
                onClick={()=>setEditId(eq.id)}
                style={{width:14,height:14,borderRadius:2,cursor:'pointer',background:eq.archivado?'#333':SC[eq.estado],opacity:eq.archivado?.25:1,
                  boxShadow:blNum(eq.bitlocker)===0&&!eq.archivado?'0 0 4px #ff222260':eq.estado==='ACTIVO'&&!eq.archivado?'0 0 4px #00ff2240':'none',transition:'all .3s'}}/>
            ))}
          </div>
        </div>
      ))}
      <div style={{fontSize:6,opacity:.2,marginTop:10}}>Rojo parpadeante = sin BitLocker</div>
    </div>
  );

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#020c04',color:'#00ff22',overflow:'hidden',position:'relative',fontFamily:"'Share Tech Mono',monospace"}}>
      <MatrixRain/>

      {/* TOP BAR */}
      <div style={{position:'relative',zIndex:10,background:'rgba(2,9,3,.97)',borderBottom:'1px solid #00ff2210',backdropFilter:'blur(5px)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',padding:'8px 20px',gap:14,flexWrap:'wrap'}}>
          <div style={{flexShrink:0}}>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:18,fontWeight:900,letterSpacing:6,textShadow:'0 0 22px #00ff22'}}>NETGRID</div>
            <div style={{fontSize:6,letterSpacing:4,opacity:.2}}>LOCAL — localStorage</div>
          </div>
          <div style={{width:1,height:36,background:'#00ff2210'}}/>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:14,letterSpacing:3}}>{time}</div>
          <div style={{width:1,height:36,background:'#00ff2210'}}/>
          {[{l:'TOTAL',v:stats.total,c:'#00ff22'},{l:'ACTIVOS',v:stats.activo,c:'#00ff22'},{l:'MANT',v:stats.mantenimiento,c:'#ffff00'},{l:'BAJA',v:stats.baja,c:'#ff2222'},{l:'BL SI',v:stats.bl_si,c:'#00ff22'},{l:'BL NO',v:stats.bl_no,c:'#ff2222'},{l:'BL ?',v:stats.bl_dk,c:'#ffff00'}].map(item=>(
            <div key={item.l} style={{textAlign:'center',minWidth:34}}>
              <div style={{fontSize:6,letterSpacing:1,opacity:.28,marginBottom:1}}>{item.l}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:14,fontWeight:700,color:item.c,textShadow:`0 0 6px ${item.c}`}}>{item.v}</div>
            </div>
          ))}
          {stats.sin_cifrado>0&&<div style={{padding:'4px 10px',background:'#2a0000',border:'1px solid #ff222240',borderRadius:4,fontSize:7,color:'#ff2222',animation:'pulse 1.5s infinite',letterSpacing:1}}>
            ! {stats.sin_cifrado} SIN CIFRADO
          </div>}
          <div style={{width:1,height:36,background:'#00ff2210'}}/>
          <div style={{minWidth:76}}>
            <div style={{fontSize:6,opacity:.25,marginBottom:3,textAlign:'center'}}>DISPONIB.</div>
            <div style={{height:4,background:'#0a1a0a',borderRadius:2,overflow:'hidden',marginBottom:2}}>
              <div style={{height:'100%',width:pct+'%',background:pct>80?'linear-gradient(90deg,#0a2,#00ff22)':pct>50?'linear-gradient(90deg,#aa6,#ffff00)':'linear-gradient(90deg,#800,#ff2222)',transition:'width .8s'}}/>
            </div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:13,textAlign:'center',fontWeight:700,color:pct>80?'#00ff22':pct>50?'#ffff00':'#ff2222'}}>{pct}%</div>
          </div>
          <div style={{flex:1}}/>
          <button onClick={()=>setShowNuevo(true)} style={{padding:'7px 16px',background:'#0a1a0a',border:'1px solid #00ff22',color:'#00ff22',fontFamily:'monospace',fontSize:8,letterSpacing:2,cursor:'pointer',borderRadius:4}} onMouseOver={e=>e.currentTarget.style.background='#0f2210'} onMouseOut={e=>e.currentTarget.style.background='#0a1a0a'}>+ EQUIPO</button>
        </div>

        {/* Filtros */}
        <div style={{display:'flex',alignItems:'center',padding:'5px 20px',gap:6,borderTop:'1px solid #00ff2208',flexWrap:'wrap'}}>
          <div style={{position:'relative'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nombre / IP / MAC / usuario / depto / ubicacion..."
              style={{background:'#0a160a',border:'1px solid #00ff2215',color:'#00ff22',fontFamily:'monospace',fontSize:9,padding:'5px 9px',borderRadius:4,outline:'none',width:310}}
              onFocus={e=>e.target.style.borderColor='#00ff22'} onBlur={e=>e.target.style.borderColor='#00ff2215'}/>
            {search&&<span onClick={()=>setSearch('')} style={{position:'absolute',right:7,top:'50%',transform:'translateY(-50%)',cursor:'pointer',opacity:.4,fontSize:9}}>X</span>}
          </div>
          <div style={{width:1,height:18,background:'#00ff2210'}}/>
          {['TODOS',...ESTADOS].map(f=><button key={f} onClick={()=>setFEstado(f)} style={fb(fEstado===f,f==='TODOS'?'#00ff22':SC[f])}>{f}</button>)}
          <div style={{width:1,height:18,background:'#00ff2210'}}/>
          <span style={{fontSize:7,opacity:.3}}>BL:</span>
          {[['TODOS','#00ff22'],['1','#00ff22'],['0','#ff2222'],['2','#ffff00']].map(([v,c])=><button key={v} onClick={()=>setFBL(v)} style={fb(fBL===v,c)}>{v==='TODOS'?'TODO':v==='1'?'🔒 SI':v==='0'?'🔓 NO':'❓'}</button>)}
          <div style={{width:1,height:18,background:'#00ff2210'}}/>
          <button onClick={()=>{setFArchiv(a=>!a);setFEstado('TODOS');setFBL('TODOS');}} style={fb(fArchiv,'#ff8800')}>ARCH.</button>
          <div style={{width:1,height:18,background:'#00ff2210'}}/>
          {['GRID','LISTA'].map(v=><button key={v} onClick={()=>setVista(v)} style={fb(vista===v,'#00aaff')}>{v}</button>)}
          {selIds.size>0&&<>
            <div style={{width:1,height:18,background:'#00ff2210'}}/>
            <span style={{fontSize:8,color:'#00aaff'}}>{selIds.size} sel</span>
            <button onClick={bulkArchivar} style={fb(false,'#ff8800')}>ARCHIVAR</button>
            <button onClick={()=>setSelIds(new Set())} style={{padding:'3px 6px',background:'transparent',border:'1px solid #222',color:'#444',fontFamily:'monospace',fontSize:8,cursor:'pointer',borderRadius:3}}>X</button>
          </>}
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative',zIndex:5}}>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtrados.length===0
            ?<div style={{textAlign:'center',padding:'70px 20px',opacity:.2,fontSize:10,letterSpacing:3}}>
              {fArchiv?'SIN ARCHIVADOS':db.equipos.filter(e=>!e.archivado).length===0?'SIN EQUIPOS':'SIN RESULTADOS'}
            </div>
            : vista==='GRID'
              ?<div style={{padding:'14px 18px',display:'flex',flexWrap:'wrap',gap:10}}>
                {filtrados.map(eq=><PCCard key={eq.id} eq={eq} onEdit={setEditId} selected={selIds.has(eq.id)} onSelect={toggleSel}/>)}
              </div>
              :<div style={{padding:'8px 0'}}>
                {/* Encabezado lista */}
                <div style={{display:'grid',gridTemplateColumns:'16px 1fr 110px 150px 90px 100px 100px 90px',gap:10,padding:'6px 14px',borderBottom:'1px solid #00ff2215',marginBottom:2}}>
                  {['','NOMBRE','IP','MAC','USUARIO','DEPTO','BITLOCKER','ULT. MANT.'].map((h,i)=><span key={i} style={{fontSize:7,opacity:.3,letterSpacing:2}}>{h}</span>)}
                </div>
                {filtrados.map(eq=><PCRow key={eq.id} eq={eq} onEdit={setEditId} selected={selIds.has(eq.id)} onSelect={toggleSel}/>)}
              </div>
          }
        </div>

        {/* Panel lateral */}
        <div style={{width:248,borderLeft:'1px solid #00ff2210',background:'rgba(2,9,3,.97)',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{display:'flex',borderBottom:'1px solid #00ff2210',flexShrink:0}}>
            {['LOGS','STATS','MAPA'].map(t=>(
              <button key={t} onClick={()=>setPanel(t)} style={{flex:1,padding:'8px 0',background:panel===t?'#00ff2206':'transparent',border:'none',borderBottom:panel===t?'2px solid #00ff22':'2px solid transparent',color:panel===t?'#00ff22':'#00ff2225',fontFamily:'monospace',fontSize:7,letterSpacing:3,cursor:'pointer'}}>{t}</button>
            ))}
          </div>
          {panel==='LOGS'&&<LogsPanel/>}
          {panel==='STATS'&&<StatsPanel/>}
          {panel==='MAPA'&&<MapaPanel/>}
        </div>
      </div>

      {/* Status bar */}
      <div style={{position:'relative',zIndex:10,borderTop:'1px solid #00ff2210',background:'rgba(2,9,3,.97)',padding:'4px 20px',display:'flex',gap:14,fontSize:7,letterSpacing:2,opacity:.3,alignItems:'center',flexShrink:0}}>
        <span style={{animation:'pulse 2s infinite'}}>o</span>
        <span>NETGRID · {nowD()}</span>
        <span>TOTAL {stats.total}</span>
        <span style={{color:'#00ff22'}}>ACTIVOS {stats.activo}</span>
        <span style={{color:'#ff2222'}}>SIN CIFRADO {stats.bl_no}</span>
        <div style={{flex:1}}/>
        <span style={{animation:'blink 1s infinite'}}>_</span>
      </div>

      {/* Toast */}
      {toast&&<div style={{position:'fixed',bottom:26,right:26,zIndex:5000,background:'rgba(3,14,5,.97)',border:`1px solid ${toast.type==='warn'?'#ff8800':'#00ff22'}`,color:toast.type==='warn'?'#ff8800':'#00ff22',padding:'9px 20px',borderRadius:4,fontFamily:'monospace',fontSize:9,letterSpacing:2,animation:'fadein .2s ease'}}>
        {toast.type==='warn'?'! ':''}{toast.msg.toUpperCase()}
      </div>}

      {editId   &&<PCModal eqId={editId} equipos={db.equipos} dispatch={dispatch} onClose={()=>setEditId(null)} showToast={showToast}/>}
      {showNuevo&&<NuevoModal dispatch={dispatch} onClose={()=>setShowNuevo(false)} showToast={showToast}/>}
      {archiveEq&&<ArchivarModal eq={archiveEq} dispatch={dispatch} onClose={()=>setArchiveEq(null)} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
